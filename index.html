<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bryce's Program">
<meta name="theme-color" content="#0d0d0d">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bryce's Program</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --black:#0d0d0d;--dark:#151515;--card:#1c1c1c;--card2:#222;--border:#2a2a2a;
    --accent:#c8f135;--accent-dim:rgba(200,241,53,0.12);
    --blue:#64b4ff;--blue-dim:rgba(100,180,255,0.08);
    --orange:#ff9f43;--orange-dim:rgba(255,159,67,0.1);
    --green:#4ade80;--white:#f0f0f0;--muted:#6b6b6b;--input-bg:#252525;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:100px;}
  header{background:var(--dark);border-bottom:1px solid var(--border);padding:48px 20px 0;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  .program-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.03em;line-height:1;}
  h1 span{color:var(--accent);}
  .week-indicator{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .week-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;letter-spacing:.08em;}
  .week-badge.week-a{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(200,241,53,.4);}
  .week-badge.week-b{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,159,67,.4);}
  .week-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;}
  .day-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin:0 -20px;padding:0 20px;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:all .2s;}
  .tab:hover{color:var(--white);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:5px;vertical-align:middle;opacity:0;}
  .tab-dot.has-log{opacity:1;}
  main{padding:20px;max-width:640px;margin:0 auto;}
  .day-content{display:none;}
  .day-content.active{display:block;}
  .day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
  .day-number{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.2em;margin-bottom:3px;}
  .day-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;line-height:1;}
  .day-subtitle{font-size:12px;color:var(--muted);margin-top:3px;font-weight:300;}
  .tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;padding:3px 8px;border-radius:4px;text-transform:uppercase;margin-top:4px;display:inline-block;}
  .tag-heavy{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(200,241,53,.3);}
  .tag-volume{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,159,67,.3);}
  .session-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .session-date-input{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 12px;flex:1;outline:none;}
  .session-date-input:focus{border-color:var(--accent);}
  .section{margin-bottom:24px;}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);}
  .exercise-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;}
  .exercise-card.anchor{border-left:3px solid var(--accent);}
  .exercise-card.anchor-vol{border-left:3px solid var(--orange);}
  .exercise-header{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .exercise-name{font-weight:600;font-size:13px;line-height:1.3;}
  .exercise-note{font-size:11px;color:var(--muted);font-weight:300;line-height:1.4;margin-top:2px;}
  .exercise-target{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);white-space:nowrap;flex-shrink:0;text-align:right;}
  .exercise-target.vol-target{color:var(--orange);}
  .exercise-target .target-label{font-size:9px;color:var(--muted);display:block;margin-bottom:1px;}
  .log-area{background:var(--card2);border-top:1px solid var(--border);padding:10px 14px 12px;}
  .suggestion-box{background:rgba(100,180,255,0.08);border:1px solid rgba(100,180,255,0.2);border-radius:6px;padding:8px 12px;margin-bottom:10px;}
  .suggestion-box .sugg-title{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;}
  .suggestion-box .sugg-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--white);}
  .suggestion-box .sugg-last{font-size:11px;color:var(--muted);margin-top:2px;}
  .set-entry{display:flex;gap:6px;align-items:center;margin-bottom:4px;}
  .set-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:24px;flex-shrink:0;}
  .log-input{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:7px 10px;width:100%;outline:none;text-align:center;-webkit-appearance:none;}
  .log-input:focus{border-color:var(--accent);}
  .log-input::placeholder{color:var(--muted);font-weight:400;}
  .add-set-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:none;border:1px dashed rgba(200,241,53,.3);border-radius:6px;padding:5px 10px;cursor:pointer;width:100%;margin-top:4px;}
  .superset-block{border:1px solid rgba(100,180,255,.3);border-radius:10px;padding:4px;margin-bottom:6px;background:rgba(100,180,255,.03);}
  .superset-header{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);letter-spacing:.15em;text-transform:uppercase;padding:6px 10px 4px;}
  .superset-block .exercise-card{margin-bottom:3px;border-radius:7px;}
  .superset-block .exercise-card:last-child{margin-bottom:0;}
  .superset-divider{text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);padding:2px 0;}
  .rest-day{text-align:center;padding:80px 24px;}
  .rest-icon{font-size:44px;margin-bottom:16px;}
  .rest-title{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:.05em;color:var(--muted);margin-bottom:12px;}
  .rest-desc{font-size:13px;color:var(--muted);max-width:340px;margin:0 auto;line-height:1.7;font-weight:300;}
  .save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:200;}
  .btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn-accent{background:var(--accent);color:var(--black);font-weight:600;}
  .btn-ghost{background:var(--card);color:var(--muted);border:1px solid var(--border);}
  .save-bar .btn{flex:1;padding:12px;font-size:12px;}

  .history-section{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);}
  .history-section-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
  .history-toggle-btn{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);background:none;border:none;cursor:pointer;letter-spacing:.1em;}
  .history-entry{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;}
  .history-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .history-entry-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);}
  .history-entry-week{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;}
  .history-exercise{margin-bottom:6px;}
  .history-exercise-name{font-size:11px;font-weight:600;color:var(--white);margin-bottom:2px;}
  .history-sets{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
  .add-exercise-section{margin-top:16px;}
  .add-exercise-btn{width:100%;padding:12px;background:var(--card);border:1px dashed var(--accent);border-radius:10px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .custom-exercise-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-top:6px;overflow:hidden;}
  .custom-exercise-header{padding:10px 14px;display:flex;align-items:center;gap:8px;}
  .custom-exercise-input{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:13px;font-weight:600;padding:6px 10px;flex:1;outline:none;}
  .custom-exercise-input:focus{border-color:var(--accent);}
  .remove-exercise-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px;}


  .exercise-card { position: relative; }
  .move-btns { display: none; } /* handled individually */
  .move-btn {
    position: absolute;
    top: 8px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 10px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    padding: 0;
    transition: all 0.15s;
    z-index: 10;
  }
  .move-btn:active { background: var(--accent); color: var(--black); border-color: var(--accent); }
  .move-btn-up { right: 56px; }
  .move-btn-down { right: 28px; }
  .exercise-card .exercise-header { padding-left: 14px; padding-right: 114px; }
  .exercise-card.anchor .exercise-header,
  .exercise-card.anchor-vol .exercise-header { padding-left: 14px; padding-right: 114px; }


  .delete-exercise-btn {
    position: absolute;
    top: 8px; right: 6px;
    width: 22px; height: 22px;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: all 0.2s;
    z-index: 10;
  }
  .delete-exercise-btn:active { color: #ff6b6b; background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.4); }


  .add-superset-btn {
    width:100%;padding:12px;background:var(--card);
    border:1px dashed rgba(100,180,255,0.4);border-radius:10px;
    color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;
  }
  .superset-mode-banner {
    background:rgba(100,180,255,0.08);border:1px solid rgba(100,180,255,0.3);
    border-radius:8px;padding:10px 14px;margin-bottom:10px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);
    display:flex;align-items:center;justify-content:space-between;
  }
  .superset-mode-cancel {
    background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0 4px;
  }
  .exercise-card.superset-pick-target,
  .custom-exercise-card.superset-pick-target {
    border: 1px dashed rgba(100,180,255,0.6) !important;
    cursor:pointer;
  }
  .exercise-card.superset-pick-target:hover,
  .custom-exercise-card.superset-pick-target:hover {
    border-color: var(--blue) !important;
    background: rgba(100,180,255,0.05);
  }
  .exercise-card.superset-selected,
  .custom-exercise-card.superset-selected {
    border: 2px solid var(--blue) !important;
  }


  .drop-set-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--blue);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 0 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .drop-set-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 4px;
    padding-left: 20px;
    border-left: 2px solid rgba(100,180,255,0.3);
    margin-left: 8px;
  }
  .drop-set-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--blue);
    width: 24px;
    flex-shrink: 0;
    letter-spacing: .05em;
  }
  .drop-set-remove {
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 2px;
    flex-shrink: 0;
  }


  .session-meta {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .session-meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .feel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .feel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 32px;
    flex-shrink: 0;
  }
  .feel-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
  }
  .feel-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--black);
  }
  .feel-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .feel-emoji {
    font-size: 18px;
    flex-shrink: 0;
    width: 24px;
  }
  .session-notes-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 300;
    padding: 10px 12px;
    outline: none;
    resize: none;
    min-height: 70px;
    line-height: 1.5;
  }
  .session-notes-input:focus { border-color: var(--accent); }
  .session-notes-input::placeholder { color: var(--muted); }


  .export-btn {
    width: 100%;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 6px;
    transition: all 0.2s;
  }
  .export-btn:active { border-color: var(--accent); color: var(--accent); }
  .import-area {
    margin-top: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .import-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .import-textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 10px 12px;
    outline: none;
    resize: none;
    min-height: 80px;
    line-height: 1.5;
  }
  .import-textarea:focus { border-color: var(--accent); }
  .import-btn {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: var(--black);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
  }


  .history-edit-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    background: none;
    border: 1px solid rgba(200,241,53,0.3);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .edit-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    display: flex;
    align-items: flex-end;
  }
  .edit-modal {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-height: 70vh;
    overflow-y: auto;
  }
  .edit-modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .edit-modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
  }
  .edit-feel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .edit-modal-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .1em;
    margin-bottom: 6px;
  }
  .edit-notes-ta {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    resize: none;
    min-height: 80px;
    line-height: 1.5;
  }
  .edit-notes-ta:focus { border-color: var(--accent); }
  .edit-save-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: var(--black);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
  }


  .progress-container { padding: 0 0 40px; }
  .progress-header { margin-bottom: 20px; }
  .progress-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: .04em; }
  .progress-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 300; }
  .lift-selector {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    margin-bottom: 20px;
    cursor: pointer;
  }
  .chart-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    position: relative;
  }
  .chart-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// One-time migration: fold any history still sitting under old, now-removed
// exercise IDs into their unified canonical replacements, so nothing logged
// before the ID consolidation gets silently orphaned.
function migrateOldExerciseIds() {
  if (localStorage.getItem('_migrated_v2_6_64')) return; // already done

  const idMap = {
    'incline-smith-fri-b': 'incline-smith',
    'flat-smith-fri-b': 'flat-smith',
    'cable-lat-raise-fri-b': 'cable-lat-raise-tue',
    'incline-smith-tue-b': 'incline-smith-vol',
    'incline-smith-fri': 'incline-smith-vol',
  };

  Object.entries(idMap).forEach(([oldId, newId]) => {
    const oldKey = 'hist_' + oldId;
    const newKey = 'hist_' + newId;
    const oldData = localStorage.getItem(oldKey);
    if (!oldData) return;

    let oldSessions;
    try { oldSessions = JSON.parse(oldData); } catch(e) { return; }
    if (!Array.isArray(oldSessions) || !oldSessions.length) return;

    const newData = localStorage.getItem(newKey);
    let newSessions = [];
    if (newData) {
      try { newSessions = JSON.parse(newData); } catch(e) { newSessions = []; }
    }

    // Merge, dedupe by date+weight+reps signature, sort by date, cap at 12
    const combined = [...newSessions, ...oldSessions];
    const seen = new Set();
    const deduped = combined.filter(s => {
      const sig = s.date + '_' + JSON.stringify(s.sets);
      if (seen.has(sig)) return false;
      seen.add(sig);
      return true;
    }).sort((a, b) => a.date > b.date ? 1 : -1).slice(-12);

    localStorage.setItem(newKey, JSON.stringify(deduped));
    localStorage.removeItem(oldKey);
  });

  localStorage.setItem('_migrated_v2_6_64', 'true');
}

// One-time migration: hist_close-pulldown was accidentally shared between
// two DIFFERENT exercises (Close Grip Lat Pulldown, from the real program,
// and Seated Cable High to Low Row, from the accessory randomizer pool)
// because they collided on the same exercise ID. This splits the mixed
// history back into two separate, correctly-named buckets by matching each
// entry's date + sets against the session-level history, which does store
// the real exercise name.
function migrateClosePulldownCollision() {
  if (localStorage.getItem('_migrated_v2_6_86')) return;

  const mixedRaw = localStorage.getItem('hist_close-pulldown');
  if (!mixedRaw) { localStorage.setItem('_migrated_v2_6_86', 'true'); return; }

  let mixedEntries;
  try { mixedEntries = JSON.parse(mixedRaw); } catch(e) { mixedEntries = []; }
  if (!Array.isArray(mixedEntries) || !mixedEntries.length) {
    localStorage.setItem('_migrated_v2_6_86', 'true');
    return;
  }

  // Build a date -> exercise name lookup from every pull session, checking
  // for entries that match "Close Grip Lat Pulldown" or "Seated Cable High
  // to Low Row" specifically.
  const dateToName = {}; // date -> 'lat-pulldown' | 'high-low-row' | null (ambiguous)
  ['hist_session_pull-heavy', 'hist_session_pull-volume'].forEach(key => {
    let sessions;
    try { sessions = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { sessions = []; }
    sessions.forEach(session => {
      (session.exercises || []).forEach(ex => {
        const nameLower = (ex.name || '').toLowerCase();
        if (nameLower.includes('close grip') && nameLower.includes('pulldown')) {
          dateToName[session.date] = dateToName[session.date] === undefined ? 'lat-pulldown'
            : (dateToName[session.date] === 'lat-pulldown' ? 'lat-pulldown' : 'ambiguous');
        } else if (nameLower.includes('high to low') || nameLower.includes('high-low')) {
          dateToName[session.date] = dateToName[session.date] === undefined ? 'high-low-row'
            : (dateToName[session.date] === 'high-low-row' ? 'high-low-row' : 'ambiguous');
        }
      });
    });
  });

  const lowRowEntries = [];
  const pulldownEntries = [];
  const unresolvedEntries = [];

  mixedEntries.forEach(entry => {
    const match = dateToName[entry.date];
    if (match === 'high-low-row') lowRowEntries.push(entry);
    else if (match === 'lat-pulldown') pulldownEntries.push(entry);
    else unresolvedEntries.push(entry); // ambiguous or no session match found
  });

  // Close Grip Lat Pulldown keeps the original id (it was there first, in
  // the real program). Seated Cable High to Low Row moves to its new id.
  // Anything unresolved stays with Lat Pulldown as the safer default, since
  // that's the exercise that's been in the program the longest.
  const finalPulldown = [...pulldownEntries, ...unresolvedEntries];

  if (finalPulldown.length) {
    localStorage.setItem('hist_close-pulldown', JSON.stringify(finalPulldown));
  } else {
    localStorage.removeItem('hist_close-pulldown');
  }
  if (lowRowEntries.length) {
    const existing = JSON.parse(localStorage.getItem('hist_cable-high-low-row') || '[]');
    localStorage.setItem('hist_cable-high-low-row', JSON.stringify([...existing, ...lowRowEntries]));
  }

  localStorage.setItem('_migrated_v2_6_86', 'true');
}

    badge.textContent = 'WEEK B';
    badge.className = 'week-badge week-b';
    label.textContent = 'Volume Mon/Tue/Sat · Heavy Wed/Thu/Fri';
  }
}

function getCurrentVariant(dayIndex) {
  const day = PROGRAM[dayIndex];
  if (day.rest) return null;
  return isWeekA ? day.weekA : day.weekB;
}

function buildTabs() {
  const tabsEl = document.getElementById('dayTabs');
  PROGRAM.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.innerHTML = `${day.label}<span class="tab-dot" id="dot-${i}"></span>`;
    btn.onclick = () => switchDay(i);
    tabsEl.appendChild(btn);
  });
  const coachBtn = document.createElement('button');
  coachBtn.className = 'tab';
  coachBtn.id = 'coach-tab-btn';
  coachBtn.textContent = '🧠 Coach';
  coachBtn.onclick = () => showCoachTab();
  tabsEl.appendChild(coachBtn);
}

// Silently persists whatever is currently in sessionLogs for the day being
// LEFT, so switching to a different day (or Coach/Progress and back) never
// destroys unsaved in-progress inputs. This is NOT a real "save workout" —
// no history writing, no PR checks, no success screen — just a lightweight
// snapshot so the data survives navigation. saveDay() still does the real,
// permanent save when the user actually taps Save Workout.
async function autosaveCurrentDay() {
  const day = PROGRAM[currentDay];
  if (!day || day.rest) return; // nothing to autosave on a rest day
  const variant = getCurrentVariant(currentDay);
  if (!variant) return;
  // Only autosave if there's actually something worth preserving — avoids
  // overwriting a real saved log with an empty object on every navigation.
  const hasAnyData = Object.keys(sessionLogs).some(k => {
    if (k.startsWith('_')) return false;
    const log = sessionLogs[k];
    return log && log.sets && log.sets.some(s => s.weight || s.reps);
  });
  if (!hasAnyData && !(sessionLogs._custom || []).some(c => c && c.sets && c.sets.some(s => s.weight || s.reps))) {
    return;
  }
  // Ensure _date is set to TODAY before autosaving — loadDay() treats a
  // missing or mismatched _date as "this log is stale, clear it", which
  // would otherwise immediately wipe out the very data we're trying to
  // preserve the next time this day loads.
  if (!sessionLogs._date) {
    sessionLogs._date = new Date().toISOString().split('T')[0];
  }
  try {
    await saveToDB('log_' + variant.id, sessionLogs);
  } catch (err) {
    console.error('Autosave failed:', err);
  }
}

async function switchDay(index) {
  // Force blur first so an actively-typed value commits to sessionLogs
  // before we read/save it below.
  if (document.activeElement && typeof document.activeElement.blur === 'function') {
    document.activeElement.blur();
  }

  // Autosave whatever is in sessionLogs for the day we're LEAVING, before
  // switching away — this is what actually prevents data loss when going
  // from one real training day to another (Coach/Progress alone never
  // solved this, since sessionLogs is a single shared variable, not scoped
  // per day — switching days always overwrote it with zero persistence).
  await autosaveCurrentDay();

  // Were we on Coach/Progress (main content replaced) and are we now
  // returning to the SAME workout day we had open before? If so, this is a
  // "come back from Coach" navigation, not a real day switch — skip the
  // disk reload and just re-render from the in-memory state, since it's
  // already correct and a reload would be redundant (though no longer
  // destructive either way now that autosave exists as a backstop).
  const returningToSameUnsavedDay = (currentDay === index);

  currentDay = index;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
  const ctab = document.getElementById('coach-tab-btn');
  if (ctab) ctab.classList.remove('active');

  if (returningToSameUnsavedDay) {
    renderDay(index);
  } else {
    await loadDay(index); // now safe — the day we left was just autosaved above
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function loadDay(index) {
  const variant = getCurrentVariant(index);
  if (!variant) { renderDay(index); return; }
  const saved = await loadFromDB('log_' + variant.id);
  const today = new Date().toISOString().split('T')[0];

  if (justSavedDay === index) {
    // Just saved this day - force blank inputs regardless of date match
    sessionLogs = {};
    justSavedDay = null;
  } else if (saved && saved._date && saved._date !== today) {
    // Saved log is from a previous date - clear inputs but keep history
    sessionLogs = {};
  } else {
    sessionLogs = saved || {};
  }

  const dot = document.getElementById('dot-' + index);
  if (dot) dot.classList.toggle('has-log', !!(saved && saved._date === today));
  renderDay(index);
}

function renderDay(index) {
  const main = document.getElementById('mainContent');
  const day = PROGRAM[index];
  if (day.rest) {
    main.innerHTML = `<div class="rest-day"><div class="rest-icon">🔋</div><div class="rest-title">REST DAY</div><div class="rest-desc">Six hard days. Sleep, eat your protein, and let the adaptation happen. The work is already done.</div></div>`;
    return;
  }
  const variant = getCurrentVariant(index);
  const today = new Date().toISOString().split('T')[0];
  const savedDate = sessionLogs._date || today;
  const isVol = variant.tag === 'volume';

  let html = `<div class="day-header"><div>
    <div class="day-number">Day ${index + 1} · ${day.label.split('·')[0].trim()} · ${isWeekA ? 'Week A' : 'Week B'} · ${variant.tag.toUpperCase()}</div>
    <div class="day-title">${variant.title}</div>
    <div class="day-subtitle">${variant.subtitle}</div>
  </div><span class="tag tag-${variant.tag}">${variant.tag}</span></div>`;

  const savedFeel = sessionLogs._feel || 7;
  const savedNotes = sessionLogs._notes || '';
  const feelEmoji = getFeel(savedFeel);
  html += `<div class="session-row"><input type="date" class="session-date-input" id="sessionDate" value="${savedDate}"></div>`;
  if (isDeloadWeek) {
    html += `<div class="deload-banner">
      <div class="deload-icon">🔋</div>
      <div class="deload-text">
        <strong>Deload Week</strong> — 60–70% of working weight, 3–4 sets at 12–15 reps. No grinding. Focus on form and feel.<br>
        <button class="deload-toggle" onclick="toggleDeload()">↺ Switch to normal week</button>
      </div>
    </div>`;
  }
  html += `<div class="session-meta">
    <div class="session-meta-label">Session Check-In</div>
    <div class="feel-row">
      <span class="feel-label">Feel</span>
      <input type="range" class="feel-slider" id="feelSlider" min="1" max="10" value="${savedFeel}"
        oninput="updateFeel(this.value)"/>
      <span class="feel-value" id="feelValue">${savedFeel}</span>
      <span class="feel-emoji" id="feelEmoji">${feelEmoji}</span>
    </div>
    <textarea class="session-notes-input" id="sessionNotes" placeholder="How did you feel? Anything to note about today's session..."
      oninput="sessionLogs._notes = this.value">${savedNotes}</textarea>
  </div>`;

  let accessoriesSectionId = null;
  const savedSnapshot = typeof getAccessoriesSnapshot === 'function' ? getAccessoriesSnapshot(variant.id) : null;
  variant.sections.forEach((section, sIdx) => {
    // Target the actual "Accessories" section by label, not just whichever
    // section happens to be last (legs days have an Abs section after it).
    const isAccessoriesSection = section.label === 'Accessories';
    const sectionId = isAccessoriesSection ? `section-accessories-${index}` : '';
    if (isAccessoriesSection) accessoriesSectionId = sectionId;
    html += `<div class="section"${sectionId ? ` id="${sectionId}"` : ''}><div class="section-label">${section.label}</div>`;

    // If this is the Accessories section AND a snapshot exists from a prior
    // logged session of this exact day variant, render the snapshot instead
    // of the static program list — so the day defaults to what was actually
    // done last time. Randomize Accessories still works on top of this.
    if (isAccessoriesSection && savedSnapshot && savedSnapshot.length) {
      const rendered = new Set();
      savedSnapshot.forEach(ex => {
        if (rendered.has(ex.id)) return;
        if (ex.supersetGroup) {
          const partner = savedSnapshot.find(p => p.id !== ex.id && p.supersetGroup === ex.supersetGroup && !rendered.has(p.id));
          if (partner) {
            html += `<div class="superset-block"><div class="superset-header">⚡ Superset — back to back</div>`;
            html += renderExercise(ex, isVol);
            html += `<div class="superset-divider">↕ then immediately</div>`;
            html += renderExercise(partner, isVol);
            html += `</div>`;
            rendered.add(ex.id);
            rendered.add(partner.id);
            return;
          }
        }
        html += renderExercise(ex, isVol);
        rendered.add(ex.id);
      });
    } else {
      section.exercises.forEach(ex => {
        if (ex.superset) {
          html += `<div class="superset-block"><div class="superset-header">⚡ Superset — back to back</div>`;
          ex.exercises.forEach((sex, si) => {
            html += renderExercise(sex, isVol);
            if (si < ex.exercises.length - 1) html += `<div class="superset-divider">↕ then immediately</div>`;
          });
          html += `</div>`;
        } else {
          html += renderExercise(ex, isVol);
        }
      });
    }
    html += `</div>`;
  });

  // Fallback: if no section was labeled "Accessories", use the last rendered
  // section so the Add Exercise / Add Superset buttons always have a target.
  if (!accessoriesSectionId && variant.sections.length) {
    accessoriesSectionId = `section-accessories-${index}`;
  }

  // Deload extras - extra accessories only shown during deload week
  if (isDeloadWeek) {
    const deloadExtras = getDeloadExtras(variant.id);
    if (deloadExtras.length > 0) {
      html += `<div class="section"><div class="section-label" style="color:var(--orange);">🔋 Deload Extras</div>`;
      deloadExtras.forEach(ex => {
        html += renderExercise(ex, true);
      });
      html += `</div>`;
    }
  }

  // Burn finisher - one high-rep exercise on volume days only, not during deload
  // (deload is already low-intensity everywhere, so a burn finisher would be redundant)
  if (!isDeloadWeek && variant.tag === 'volume') {
    const burnFinisher = getBurnFinisher(variant.id);
    if (burnFinisher) {
      html += `<div class="section"><div class="section-label" style="color:#ff6b4a;">🔥 Burn Finisher</div>`;
      html += renderExercise(burnFinisher, true);
      html += `</div>`;
    }
  }
  main.innerHTML = html;

  // Wrapped in try/catch so that if anything below throws (history section,
  // Add Exercise button, export/import, etc.), the error is shown directly
  // on screen instead of silently failing and leaving those sections
  // missing with no way to diagnose what happened. Screenshot the red box
  // if you ever see one and send it over — that's the exact error to fix.
  try {
    appendHistoryAndAddExercise(index, variant);
  } catch (err) {
    console.error('appendHistoryAndAddExercise error:', err);
    const errorBanner = document.createElement('div');
    errorBanner.style.cssText = 'background:rgba(255,60,60,0.12);border:1px solid rgba(255,60,60,0.4);border-radius:10px;padding:14px 16px;margin:16px 0;';
    errorBanner.innerHTML = `
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#ff6b6b;font-weight:600;margin-bottom:6px;">⚠️ SOMETHING BROKE — screenshot this and send it to Claude</div>
      <div style="font-size:11px;color:var(--white);font-family:'JetBrains Mono',monospace;word-break:break-word;white-space:pre-wrap;">${err.message}\n\n${err.stack ? err.stack.split('\n').slice(0,3).join('\n') : ''}</div>
    `;
    main.appendChild(errorBanner);
  }
}

function appendHistoryAndAddExercise(index, variant) {
  const main = document.getElementById('mainContent');
  const accessoriesId = `section-accessories-${index}`;

  // --- ADD EXERCISE SECTION ---
  // New exercises append directly into the Accessories section so they're mixed
  // in with everything else and can be moved up/down relative to other cards.
  const addSection = document.createElement('div');
  addSection.className = 'add-exercise-section';
  addSection.innerHTML = `
    <button class="randomize-btn" onclick="randomizeAccessories()">🔀 Randomize Accessories</button>
    <button class="add-exercise-btn" onclick="openExercisePicker('${accessoriesId}', ${index})">+ Add Exercise</button>
    <button class="add-superset-btn" onclick="addCustomSuperset('${accessoriesId}', ${index})">⚡ Add Superset</button>
    <button class="add-superset-btn" style="margin-top:4px;" onclick="startPairMode(${index})">🔗 Pair Existing Exercises</button>
    <div id="superset-mode-banner-${index}"></div>
  `;
  main.appendChild(addSection);
  
  // Restore any already-added custom exercises for this session.
  // Removed custom exercises are set to null (not spliced out) to preserve
  // index alignment with sessionLogs, so this MUST skip null entries or it
  // throws trying to read .name off null — which is exactly what broke the
  // whole render (and hid Past Sessions/Export) on Friday Push.
  const customExercises = sessionLogs._custom || [];
  customExercises.forEach((ex, i) => {
    if (!ex) return;
    appendCustomExerciseCard(index, i, ex.name, ex.sets, accessoriesId);
  });

  // --- HISTORY SECTION ---
  const histSection = document.createElement('div');
  histSection.className = 'history-section';
  
  const sessions = variant ? getMuscleGroupHistory(variant) : [];
  const recent = sessions.slice(-8).reverse();

  let histHtml = `<div class="history-section-label"><span>Past Sessions</span><button class="history-toggle-btn" onclick="toggleHistory(this)">HIDE</button></div>`;
  histHtml += `<div id="history-entries">`;
  
  if (!recent.length) {
    histHtml += `<div style="font-size:12px;color:var(--muted);padding:8px 0;">No sessions logged yet — this will populate after you save workouts.</div>`;
  } else {
    recent.forEach((session, displayIdx) => {
      const feelStr = session.feel ? `${getFeel(session.feel)} ${session.feel}/10` : '';

      histHtml += `<div class="history-entry" id="hist-entry-${displayIdx}">
        <div class="history-entry-header">
          <span class="history-entry-date">${session.date}</span>
          <span class="history-entry-week">${session.week || ''} ${feelStr}</span>
        </div>
        ${session.notes ? `<div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-style:italic;">"${session.notes}"</div>` : ''}
        ${session.coachNotes ? `<div style="font-size:11px;color:#a78bfa;margin-bottom:6px;background:rgba(167,139,250,0.08);border-radius:6px;padding:6px 8px;">🧠 ${session.coachNotes}</div>` : ''}
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="history-edit-btn" onclick="editSession('${session._srcKey}', ${session._srcIdx})">✏️ Edit Notes</button>
          <button class="history-edit-btn" style="color:#ff6b6b;border-color:rgba(255,107,107,0.3);" onclick="confirmDeleteSession('${session._srcKey}', ${session._srcIdx})">🗑 Delete</button>
        </div>`;
      let lastGroup = null;
      (session.exercises || []).forEach((ex, exIdx) => {
        if (!ex.sets || !ex.sets.length) return;
        const validSets = ex.sets.filter(s => s.weight || s.reps);
        if (!validSets.length) return;
        const setsStr = validSets.map(s => `${s.isBurnout ? '🔥' : ''}${s.weight||'BW'}×${s.reps||'?'}`).join('  ');
        const hasNotes = validSets.some(s => s.note && s.note.trim());
        const notesStr = hasNotes ? validSets.filter(s => s.note).map(s => s.note).join(' / ') : '';
        
        const inSuperset = !!ex.supersetGroup;
        const isNewGroup = inSuperset && ex.supersetGroup !== lastGroup;
        
        if (isNewGroup) {
          histHtml += `<div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-top:6px;margin-bottom:2px;">⚡ superset</div>`;
        }
        
        const indentStyle = inSuperset ? 'margin-left:10px;border-left:2px solid rgba(100,180,255,0.3);padding-left:8px;' : '';
        
        histHtml += `<div class="history-exercise" style="${indentStyle}">
          <div class="history-exercise-name">${ex.name}</div>
          <div class="history-sets">${setsStr}</div>
          ${notesStr ? `<div style="font-size:10px;color:var(--muted);font-style:italic;margin-top:2px;">${notesStr}</div>` : ''}
        </div>`;
        
        lastGroup = ex.supersetGroup || null;
      });
      histHtml += `</div>`;
    });
  }
  histHtml += `</div>`;
  histSection.innerHTML = histHtml;
  main.appendChild(histSection);

  // Export/Import section
  const exportSection = document.createElement('div');
  exportSection.style.marginTop = '20px';
  exportSection.innerHTML = `
    <button class="export-btn" onclick="exportData()">📤 Export All Data (Copy to Notes)</button>
    <button class="export-btn" style="margin-top:4px;" onclick="toggleImport(this)">📥 Import / Restore Data</button>
    <div id="import-area" style="display:none;" class="import-area">
      <div class="import-label">Paste exported data below</div>
      <textarea class="import-textarea" id="import-text" placeholder="Paste your exported data here..."></textarea>
      <button class="import-btn" onclick="importData()">Restore Data</button>
    </div>
  `;
  main.appendChild(exportSection);
}

function toggleHistory(btn) {
  const entries = document.getElementById('history-entries');
  if (entries.style.display === 'none') {
    entries.style.display = 'block';
    btn.textContent = 'HIDE';
  } else {
    entries.style.display = 'none';
    btn.textContent = 'SHOW';
  }
}

function addCustomExercise(listId) {
  if (!sessionLogs._custom) sessionLogs._custom = [];
  const idx = sessionLogs._custom.length;
  sessionLogs._custom.push({ name: 'Exercise Name', sets: [{ weight: '', reps: '' }] });
  appendCustomExerciseCard(currentDay, idx, 'Exercise Name', [], listId);
}

function appendCustomExerciseCard(dayIndex, idx, name, existingSets, listId) {
  const list = document.getElementById(listId || ('custom-list-' + dayIndex));
  if (!list) return;
  const card = document.createElement('div');
  card.className = 'custom-exercise-card';
  card.id = 'custom-ex-' + idx;

  let setsHtml = (existingSets && existingSets.length ? existingSets : [{ weight: '', reps: '' }]).map((s, si) => {
    const hasNote = s.note && s.note.trim().length > 0;
    return `<div class="set-entry">
      <span class="set-num">S${si+1}</span>
      <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
        value="${s.weight||''}" onchange="updateCustomSet(${idx},${si},'weight',this.value)"/>
      <span style="color:var(--muted);font-size:12px">×</span>
      <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
        value="${s.reps||''}" onchange="updateCustomSet(${idx},${si},'reps',this.value)"/>
      <button class="drop-set-link" onclick="addCustomDropSet(${idx}, ${si}, 0, this)">↓ drop</button>
      <button class="set-notes-toggle ${hasNote ? 'has-note' : ''}" onclick="toggleCustomSetNote(this, ${idx}, ${si})">✎ note</button>
    </div>
    <div class="set-notes-area ${hasNote ? 'open' : ''}" id="custom-set-note-area-${idx}-${si}">
      <textarea class="set-note-input" placeholder="How did that feel? Anything to note..."
        oninput="updateCustomSetNote(${idx}, ${si}, this.value)">${s.note || ''}</textarea>
    </div>
    <div id="custom-drops-${idx}-${si}-0"></div>`;
  }).join('');

  card.style.position = 'relative';
  card.dataset.anchor = '0';
  card.innerHTML = `
    <button class="promote-btn" onclick="toggleAnchor(this)" title="Promote to anchor" style="position:absolute;top:8px;right:84px;width:22px;height:22px;background:var(--card2);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;">★</button>
    <button class="move-btn move-btn-up" onclick="moveCard(this, -1)" title="Move up">▲</button>
    <button class="move-btn move-btn-down" onclick="moveCard(this, 1)" title="Move down">▼</button>
    <button class="delete-exercise-btn" onclick="removeCustomExercise(${idx})" title="Remove">✕</button>
    <div class="custom-exercise-header" style="padding-right:114px;">
      <input class="custom-exercise-input" type="text" placeholder="Exercise name"
        value="${name === 'Exercise Name' ? '' : name}"
        oninput="updateCustomName(${idx}, this.value)" />
    </div>
    <div class="log-area">
      <div id="custom-sets-${idx}">${setsHtml}</div>
      <button class="add-set-btn" onclick="addCustomSet(${idx})">+ Add Set</button>
    </div>`;
  list.appendChild(card);
}

function updateCustomName(idx, val) {
  if (!sessionLogs._custom) sessionLogs._custom = [];
  if (!sessionLogs._custom[idx]) sessionLogs._custom[idx] = { name: '', sets: [] };
  sessionLogs._custom[idx].name = val;
}

function updateCustomSet(idx, setIdx, field, val) {
  if (!sessionLogs._custom) sessionLogs._custom = [];
  if (!sessionLogs._custom[idx]) sessionLogs._custom[idx] = { name: '', sets: [] };
  if (!sessionLogs._custom[idx].sets) sessionLogs._custom[idx].sets = [];
  while (sessionLogs._custom[idx].sets.length <= setIdx) sessionLogs._custom[idx].sets.push({ weight:'', reps:'' });
  sessionLogs._custom[idx].sets[setIdx][field] = val;
}

function addCustomSet(idx) {
  if (!sessionLogs._custom || !sessionLogs._custom[idx]) return;
  if (!sessionLogs._custom[idx].sets) sessionLogs._custom[idx].sets = [];
  const si = sessionLogs._custom[idx].sets.length;
  sessionLogs._custom[idx].sets.push({ weight:'', reps:'', drops:[] });
  const container = document.getElementById('custom-sets-' + idx);
  const div = document.createElement('div');
  div.className = 'set-entry';
  div.innerHTML = `<span class="set-num">S${si+1}</span>
    <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
      onchange="updateCustomSet(${idx},${si},'weight',this.value)"/>
    <span style="color:var(--muted);font-size:12px">×</span>
    <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
      onchange="updateCustomSet(${idx},${si},'reps',this.value)"/>
    <button class="drop-set-link" onclick="addCustomDropSet(${idx}, ${si}, 0, this)">↓ drop</button>
    <button class="set-notes-toggle" onclick="toggleCustomSetNote(this, ${idx}, ${si})">✎ note</button>`;
  container.appendChild(div);
  const noteArea = document.createElement('div');
  noteArea.className = 'set-notes-area';
  noteArea.id = `custom-set-note-area-${idx}-${si}`;
  noteArea.innerHTML = `<textarea class="set-note-input" placeholder="How did that feel? Anything to note..." oninput="updateCustomSetNote(${idx}, ${si}, this.value)"></textarea>`;
  container.appendChild(noteArea);
  const dropContainer = document.createElement('div');
  dropContainer.id = `custom-drops-${idx}-${si}-0`;
  container.appendChild(dropContainer);
}

function toggleCustomSetNote(btn, exIdx, setIdx) {
  const areaId = `custom-set-note-area-${exIdx}-${setIdx}`;
  const area = document.getElementById(areaId);
  if (!area) return;
  const isOpen = area.classList.contains('open');
  area.classList.toggle('open', !isOpen);
  if (!isOpen) {
    const ta = area.querySelector('textarea');
    if (ta) setTimeout(() => ta.focus(), 50);
  }
}

function updateCustomSetNote(exIdx, setIdx, value) {
  if (!sessionLogs._custom || !sessionLogs._custom[exIdx]) return;
  if (!sessionLogs._custom[exIdx].sets[setIdx]) return;
  sessionLogs._custom[exIdx].sets[setIdx].note = value;
}


function addCustomDropSet(exIdx, setIdx, dropIdx, btn) {
  if (!sessionLogs._custom || !sessionLogs._custom[exIdx]) return;
  if (!sessionLogs._custom[exIdx].sets[setIdx].drops) sessionLogs._custom[exIdx].sets[setIdx].drops = [];
  sessionLogs._custom[exIdx].sets[setIdx].drops.splice(dropIdx, 0, { weight:'', reps:'' });
  const containerId = dropIdx === 0
    ? `custom-drops-${exIdx}-${setIdx}-0`
    : `custom-drops-${exIdx}-${setIdx}-${dropIdx}`;
  const container = document.getElementById(containerId);
  if (!container) return;
  const di = dropIdx;
  container.insertAdjacentHTML('beforeend', `
    <div class="drop-set-row" id="customdroprow-${exIdx}-${setIdx}-${di}">
      <span class="drop-set-label">D${di+1}</span>
      <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
        onchange="updateCustomDrop(${exIdx},${setIdx},${di},'weight',this.value)"/>
      <span style="color:var(--muted);font-size:12px">×</span>
      <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
        onchange="updateCustomDrop(${exIdx},${setIdx},${di},'reps',this.value)"/>
      <button class="drop-set-link" onclick="addCustomDropSet(${exIdx}, ${setIdx}, ${di+1}, this)">↓ drop</button>
      <button class="drop-set-remove" onclick="removeCustomDrop(${exIdx},${setIdx},${di},this)">✕</button>
    </div>
    <div id="custom-drops-${exIdx}-${setIdx}-${di+1}"></div>
  `);
}

function updateCustomDrop(exIdx, setIdx, dropIdx, field, val) {
  if (!sessionLogs._custom || !sessionLogs._custom[exIdx]) return;
  if (!sessionLogs._custom[exIdx].sets[setIdx].drops) return;
  if (sessionLogs._custom[exIdx].sets[setIdx].drops[dropIdx]) {
    sessionLogs._custom[exIdx].sets[setIdx].drops[dropIdx][field] = val;
  }
}

function removeCustomDrop(exIdx, setIdx, dropIdx, btn) {
  const row = document.getElementById(`customdroprow-${exIdx}-${setIdx}-${dropIdx}`);
  const cont = document.getElementById(`custom-drops-${exIdx}-${setIdx}-${dropIdx+1}`);
  if (row) row.remove();
  if (cont) cont.remove();
  if (sessionLogs._custom && sessionLogs._custom[exIdx] && sessionLogs._custom[exIdx].sets[setIdx].drops) {
    sessionLogs._custom[exIdx].sets[setIdx].drops.splice(dropIdx, 1);
  }
}

function removeCustomExercise(idx) {
  const card = document.getElementById('custom-ex-' + idx);
  if (card) card.remove();
  if (sessionLogs._custom && sessionLogs._custom[idx]) {
    sessionLogs._custom[idx] = null;
  }
}


function getSuggestion(exId, isVolumeDay, isAnchor, relatedId) {
  // Burn finisher: 60-70% of the related exercise's best weight, high reps.
  // Checked before the deload branch since a burn finisher can appear on a
  // normal volume day too, not just during deload weeks.
  if (exId.startsWith('burn-')) {
    const ownHistory = getAllHistory(exId);
    const relHistory = relatedId ? getAllHistory(relatedId) : [];
    const combined = [...ownHistory, ...relHistory];
    let bestWeight = 0;
    combined.forEach(s => {
      if (!s.sets) return;
      s.sets.forEach(set => {
        const w = parseFloat(set.weight);
        if (!isNaN(w) && w > bestWeight) bestWeight = w;
      });
    });
    if (bestWeight > 0) {
      const burnWeight = Math.round((bestWeight * 0.65) / 5) * 5;
      return { note: '🔥 Burn — 65% of working weight', arrow: '↓', recWeight: burnWeight, lastWeight: bestWeight, maxReps: 0, lastDate: '', repTarget: '15–20 reps', isVolume: true, isDeload: true };
    }
    return null;
  }

  // Deload week: drop weight, higher reps
  if (isDeloadWeek) {
    // For deload, always reference the HEAVY variant's history if this exercise
    // has one, since deload weight should be based on your true strength ceiling,
    // not your lighter volume-day numbers. Map known volume IDs -> heavy IDs.
    const volToHeavy = {
      'incline-smith-vol': 'incline-smith',
    };
    const heavyId = volToHeavy[exId] || exId.replace(/-vol(-\w+)?$/, '').replace(/-vol$/, '');
    // Combine this exercise's own history + its heavy counterpart's history
    const combined = [...getAllHistory(exId), ...(heavyId !== exId ? getAllHistory(heavyId) : [])];
    let bestWeight = 0;
    combined.forEach(s => {
      if (!s.sets) return;
      s.sets.forEach(set => {
        const w = parseFloat(set.weight);
        if (!isNaN(w) && w > bestWeight) bestWeight = w;
      });
    });
    if (bestWeight > 0) {
      if (isAnchor) {
        // Anchors: 65% weight, 12-15 reps, +1 set (set count handled in renderExercise)
        const deloadWeight = Math.round((bestWeight * 0.65) / 5) * 5;
        return { note: 'Deload — 65% of best', arrow: '↓', recWeight: deloadWeight, lastWeight: bestWeight, maxReps: 0, lastDate: '', repTarget: '12–15 reps', isVolume: true, isDeload: true };
      } else {
        // Accessories: 75% weight, same sets, higher reps
        const deloadWeight = Math.round((bestWeight * 0.75) / 5) * 5;
        return { note: 'Deload — 75% of best', arrow: '↓', recWeight: deloadWeight, lastWeight: bestWeight, maxReps: 0, lastDate: '', repTarget: '12–15 reps', isVolume: true, isDeload: true };
      }
    }
    // No direct history - try relatedId for deload extras
    if (relatedId) {
      const relStored = JSON.parse(localStorage.getItem('hist_' + relatedId) || '[]');
      const relBuiltin = HISTORY[relatedId] || [];
      const relAll = [...relBuiltin, ...relStored];
      let relBest = 0;
      relAll.forEach(s => {
        if (!s.sets) return;
        s.sets.forEach(set => {
          const w = parseFloat(set.weight);
          if (!isNaN(w) && w > relBest) relBest = w;
        });
      });
      if (relBest > 0) {
        const deloadWeight = Math.round((relBest * 0.75) / 5) * 5;
        return { note: 'Deload — 75% of related', arrow: '↓', recWeight: deloadWeight, lastWeight: relBest, maxReps: 0, lastDate: '', repTarget: '12–15 reps', isVolume: true, isDeload: true };
      }
    }
  }
  const all = getAllHistory(exId);
  if (!all.length) return null;

  const last = all[all.length - 1];
  if (!last.sets || !last.sets.length) return null;

  // Find your BEST WORKING SET across ALL logged sessions for this exercise
  // (not just the most recent session) — weight and reps pulled from the
  // SAME set, so a heavy weight from one set never gets paired with reps
  // from a different set. This deliberately ignores "most recent" as the
  // reference point: a superset back-half or a fatigued/off day shouldn't
  // suppress the suggestion just because it happened to be logged last.
  // "Best" here means: heaviest weight, with the most reps at that weight
  // if there's a tie, found by comparing estimated 1RM across every set
  // you've ever logged for this exercise.
  let bestSet = null;
  let bestSetScore = -1;
  all.forEach(session => {
    if (!session.sets) return;
    session.sets.forEach(s => {
      if (s.isBurnout) return; // burnout sets are intentionally light/high-rep — never count toward "best"
      const w = parseFloat(s.weight);
      const r = parseInt(s.reps);
      if (isNaN(w) || isNaN(r) || w <= 0 || r <= 0) return;
      const score = w * (1 + r / 30); // Epley 1RM as the comparison metric
      if (score > bestSetScore) {
        bestSetScore = score;
        bestSet = { weight: w, reps: r, date: session.date };
      }
    });
  });
  if (!bestSet) return null;

  const lastWeight = bestSet.weight;
  const maxReps = bestSet.reps;

  // avgReps still reflects the MOST RECENT session specifically, since that's
  // used to judge "are you still hitting your rep target right now" for the
  // hold/bump/build logic below — that part should stay recency-based even
  // though the weight reference point itself is now best-ever.
  const lastValidSets = last.sets
    .map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps) }))
    .filter(s => !isNaN(s.weight) && s.weight > 0 && !isNaN(s.reps));
  const lastReps = lastValidSets.length ? lastValidSets.map(s => s.reps) : [maxReps];
  const avgReps = lastReps.reduce((a,b) => a+b, 0) / lastReps.length;

  // Epley 1RM estimate: weight * (1 + reps/30)
  function estimate1RM(weight, reps) {
    return weight * (1 + reps / 30);
  }

  // Find best estimated 1RM across ALL sessions
  let best1RM = 0;
  let bestSessionWeight = 0;
  let bestSessionReps = 0;
  all.forEach(session => {
    if (!session.sets) return;
    session.sets.forEach(s => {
      const w = parseFloat(s.weight);
      const r = parseInt(s.reps);
      if (isNaN(w) || isNaN(r) || w <= 0 || r <= 0) return;
      const est = estimate1RM(w, r);
      if (est > best1RM) {
        best1RM = est;
        bestSessionWeight = w;
        bestSessionReps = r;
      }
    });
  });

  if (!isAnchor) {
    return { note: 'Hold weight —', arrow: '→', recWeight: lastWeight, lastWeight, maxReps, lastDate: bestSet.date, isVolume: false };
  }

  if (isVolumeDay) {
    const looksLikeHeavy = avgReps <= 5; // 6+ reps avg is solidly volume territory
    if (looksLikeHeavy) {
      const volWeight = lastWeight > 0 ? Math.round((lastWeight * 0.875) / 5) * 5 : 0;
      return { note: 'Est. from heavy —', arrow: '→', recWeight: volWeight, lastWeight, maxReps, lastDate: bestSet.date, repTarget: '8–12 reps', isVolume: true };
    } else {
      let recWeight = lastWeight;
      let arrow = '→';
      let note = '';
      if (avgReps >= 11) {
        const bump = lastWeight >= 200 ? 5 : lastWeight >= 100 ? 5 : 2.5;
        recWeight = lastWeight + bump;
        arrow = '↑';
        note = 'Top of range — push to';
      } else if (avgReps >= 8) {
        note = 'Stay in range —';
      } else {
        note = 'Build here — stay at';
      }
      return { note, arrow, recWeight, lastWeight, maxReps, lastDate: bestSet.date, repTarget: '8–12 reps', isVolume: true };
    }
  } else {
    // Heavy day: derive working weight from best 1RM estimate across ALL sessions
    // Target ~85% of estimated 1RM for a solid 4-8 rep working weight
    const heavyFromBest1RM = best1RM > 0 ? Math.round((best1RM * 0.85) / 5) * 5 : lastWeight;

    let recWeight = Math.max(lastWeight, heavyFromBest1RM);
    let arrow = '→';
    let note = '';

    if (heavyFromBest1RM > lastWeight + 5) {
      // Volume sessions indicate capacity beyond last heavy weight
      recWeight = heavyFromBest1RM;
      arrow = '↑';
      note = 'Capacity up — try';
    } else if (avgReps >= 7.5) {
      const bump = lastWeight >= 200 ? 5 : lastWeight >= 100 ? 5 : lastWeight > 0 ? 2.5 : 0;
      recWeight = lastWeight + bump;
      arrow = '↑';
      note = 'Looking strong — try';
    } else if (avgReps <= 5) {
      note = 'Build here — stay at';
    } else {
      note = 'Match last session —';
    }
    return { note, arrow, recWeight, lastWeight, maxReps, lastDate: bestSet.date, isVolume: false };
  }
}

function renderExercise(ex, isVol) {
  const log = sessionLogs[ex.id] || {};
  // Deload week: bump sets by 1 for anchors, keep accessories same
  const deloadSets = isDeloadWeek && ex.anchor ? (ex.defaultSets || 3) + 1 : (ex.defaultSets || 3);
  const sets = log.sets || Array(deloadSets).fill(null).map(() => ({ weight: '', reps: '' }));
  const sugg = getSuggestion(ex.id, isVol, ex.anchor, ex.relatedId);
  const anchorClass = ex.anchor ? (ex.anchorVol ? ' anchor-vol' : ' anchor') : '';
  // If ex.forceName is set (e.g. picked explicitly from the exercise history
  // picker), always use it as-is and ignore any stored rename for this ID —
  // an explicit pick should show exactly what was tapped, not get silently
  // overridden by an old rename applied to the same underlying exercise ID.
  const customName = ex.forceName ? null : localStorage.getItem('name_' + ex.id);
  const displayName = ex.forceName || customName || ex.name;
  const targetClass = isVol ? ' vol-target' : '';

  let suggHtml = '';
  if (sugg) {
    const weightDisplay = sugg.recWeight > 0 ? `${sugg.recWeight}lbs` : 'BW';
    const lastDisplay = sugg.lastWeight > 0 ? `${sugg.lastWeight}lbs` : 'BW';
    const repHint = (sugg.isVolume || sugg.isDeload) ? `<span style="color:${sugg.isDeload ? 'var(--orange)' : 'var(--orange)'};font-size:11px;margin-left:6px;">@ ${sugg.repTarget}</span>` : '';
    // Deload suggestions reference "best" not "last session", so show a cleaner line
    // without the "× reps (date)" tail that only makes sense for normal suggestions.
    const lastLine = sugg.isDeload
      ? `${sugg.note} (best: ${lastDisplay})`
      : `${sugg.note} — last: ${lastDisplay} × ${sugg.maxReps}${sugg.lastDate ? ' (' + sugg.lastDate + ')' : ''}`;
    suggHtml = `<div class="suggestion-box">
      <div class="sugg-title">💡 Suggested</div>
      <div class="sugg-val">${sugg.arrow} ${weightDisplay}${repHint}</div>
      <div class="sugg-last">${lastLine}</div>
    </div>`;
  }

  let setsHtml = '';
  sets.forEach((s, i) => {
    const dropSets = s.drops || [];
    let dropHtml = '';
    dropSets.forEach((d, di) => {
      dropHtml += buildDropSetRow(ex.id, i, di, d.weight, d.reps, 0);
    });
    const hasNote = s.note && s.note.trim().length > 0;
    const isBurnout = !!s.isBurnout;
    const burnoutLabel = isBurnout ? `<span style="color:#ff6b4a;font-size:10px;margin-right:4px;" title="Burnout set">🔥</span>` : '';
    setsHtml += `<div class="set-entry" style="${isBurnout ? 'background:rgba(255,107,74,0.06);border-radius:8px;padding:4px 6px;margin:-4px -6px 8px;' : ''}">
      ${burnoutLabel}<span class="set-num">S${i+1}</span>
      <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
        value="${s.weight||''}" onchange="updateSet('${ex.id}',${i},'weight',this.value)"/>
      <span style="color:var(--muted);font-size:12px">×</span>
      <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
        value="${s.reps||''}" onchange="updateSet('${ex.id}',${i},'reps',this.value)"/>
      <button class="drop-set-link" onclick="addDropSet('${ex.id}', ${i}, 0, this)">↓ drop</button>
      <button class="set-notes-toggle ${hasNote ? 'has-note' : ''}" onclick="toggleSetNote(this, '${ex.id}', ${i})">✎ note</button>
    </div>
    <div class="set-notes-area ${hasNote ? 'open' : ''}" id="set-note-area-${ex.id}-${i}">
      <textarea class="set-note-input" placeholder="How did that feel? Anything to note..."
        oninput="updateSetNote('${ex.id}', ${i}, this.value)">${s.note || ''}</textarea>
    </div>
    <div id="drops-${ex.id}-${i}-0">${dropHtml}</div>`;
  });

  const isAnchorCard = ex.anchor || ex.anchorVol;
  return `<div class="exercise-card${anchorClass}" data-exid="${ex.id}" data-anchor="${isAnchorCard ? '1' : '0'}">
    <button class="move-btn move-btn-up" onclick="moveCard(this, -1)" title="Move up">▲</button>
    <button class="promote-btn" onclick="toggleAnchor(this)" title="${isAnchorCard ? 'Remove anchor' : 'Promote to anchor'}" style="position:absolute;top:8px;right:84px;width:22px;height:22px;background:${isAnchorCard ? 'var(--accent-dim)' : 'var(--card2)'};border:1px solid ${isAnchorCard ? 'rgba(200,241,53,.4)' : 'var(--border)'};border-radius:4px;color:${isAnchorCard ? 'var(--accent)' : 'var(--muted)'};font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;">★</button>
    <button class="move-btn move-btn-down" onclick="moveCard(this, 1)" title="Move down">▼</button>
    <button class="delete-exercise-btn" onclick="deleteExerciseCard(this)" title="Remove">✕</button>
    <div class="exercise-header">
      <div>
        <div class="exercise-name" contenteditable="true" spellcheck="false"
          style="outline:none;border-bottom:1px dashed var(--border);min-width:60px;"
          onblur="renameExercise('${ex.id}', this.textContent.trim())"
          title="Tap to rename">${displayName}</div>
        <div class="exercise-note">${ex.note}</div>
      </div>
    </div>
    <div style="padding:2px 14px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:${isDeloadWeek && ex.anchor ? 'var(--orange)' : 'var(--muted)'}">${isDeloadWeek && ex.anchor ? (deloadSets) + ' sets × 12–15 — deload' : ex.target}</div>
    <div class="log-area">
      ${suggHtml}
      <div id="sets-${ex.id}">${setsHtml}</div>
      <div style="display:flex;gap:6px;">
        <button class="add-set-btn" style="flex:1;" onclick="addSet('${ex.id}')">+ Add Set</button>
        <button class="add-set-btn" style="flex:1;color:#ff6b4a;border-color:rgba(255,107,74,0.3);" onclick="addBurnoutSet('${ex.id}')">🔥 Add Burnout</button>
      </div>
    </div>
  </div>`;
}

function updateSet(exId, setIndex, field, value) {
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  if (!sessionLogs[exId].sets) sessionLogs[exId].sets = [];
  while (sessionLogs[exId].sets.length <= setIndex) sessionLogs[exId].sets.push({ weight:'', reps:'' });
  sessionLogs[exId].sets[setIndex][field] = value;
}

function addSet(exId) {
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  if (!sessionLogs[exId].sets) sessionLogs[exId].sets = [];
  const container = document.getElementById('sets-' + exId);
  // See addBurnoutSet for why we count actual rendered DOM rows rather than
  // trusting sessionLogs.length alone — a blank default set not yet typed
  // into exists visually but not in sessionLogs yet, which would otherwise
  // cause a duplicate set number here too.
  const renderedSetCount = container ? container.querySelectorAll('.set-entry').length : 0;
  const setIndex = Math.max(sessionLogs[exId].sets.length, renderedSetCount);
  while (sessionLogs[exId].sets.length < setIndex) {
    sessionLogs[exId].sets.push({ weight: '', reps: '' });
  }
  sessionLogs[exId].sets.push({ weight:'', reps:'', drops:[] });
  const div = document.createElement('div');
  div.className = 'set-entry';
  div.innerHTML = `<span class="set-num">S${setIndex+1}</span>
    <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
      onchange="updateSet('${exId}',${setIndex},'weight',this.value)"/>
    <span style="color:var(--muted);font-size:12px">×</span>
    <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
      onchange="updateSet('${exId}',${setIndex},'reps',this.value)"/>
    <button class="drop-set-link" onclick="addDropSet('${exId}', ${setIndex}, 0, this)">↓ drop</button>
    <button class="set-notes-toggle" onclick="toggleSetNote(this, '${exId}', ${setIndex})">✎ note</button>`;
  container.appendChild(div);
  // Add note area
  const noteArea = document.createElement('div');
  noteArea.className = 'set-notes-area';
  noteArea.id = `set-note-area-${exId}-${setIndex}`;
  noteArea.innerHTML = `<textarea class="set-note-input" placeholder="How did that feel? Anything to note..." oninput="updateSetNote('${exId}', ${setIndex}, this.value)"></textarea>`;
  container.appendChild(noteArea);
  const dropContainer = document.createElement('div');
  dropContainer.id = `drops-${exId}-${setIndex}-0`;
  container.appendChild(dropContainer);
}

// Adds a set flagged as a burnout — a lighter-than-normal, high-rep (usually
// 20-30) finisher set done on a 3rd or 4th set of a normal exercise. Flagged
// with isBurnout:true so it renders with 🔥 styling and, importantly, gets
// EXCLUDED from suggestion calculations and 1RM/plateau trend analysis,
// since it's intentionally not a real working-weight set and would otherwise
// skew "best set" logic the same way a superset back-half did before.
function addBurnoutSet(exId) {
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  if (!sessionLogs[exId].sets) sessionLogs[exId].sets = [];

  const container = document.getElementById('sets-' + exId);

  // The visually rendered set count can be HIGHER than sessionLogs[exId].sets
  // length — default blank sets are shown in the DOM before you've typed
  // anything into them, and only get written into sessionLogs once you do
  // (via updateSet's onchange). Using sessionLogs.length alone here would
  // collide with an existing blank DOM row and produce a duplicate set
  // number, which is exactly what happened when S3 was left blank.
  const renderedSetCount = container ? container.querySelectorAll('.set-entry').length : 0;
  const setIndex = Math.max(sessionLogs[exId].sets.length, renderedSetCount);

  // Backfill any blank sets up to setIndex so the array stays contiguous
  // and correctly indexed (matches the pattern updateSet already uses).
  while (sessionLogs[exId].sets.length < setIndex) {
    sessionLogs[exId].sets.push({ weight: '', reps: '' });
  }
  sessionLogs[exId].sets.push({ weight:'', reps:'', drops:[], isBurnout: true });
  const div = document.createElement('div');
  div.className = 'set-entry';
  div.style.cssText = 'background:rgba(255,107,74,0.06);border-radius:8px;padding:4px 6px;margin:-4px -6px 8px;';
  div.innerHTML = `<span style="color:#ff6b4a;font-size:10px;margin-right:4px;" title="Burnout set">🔥</span><span class="set-num">S${setIndex+1}</span>
    <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
      onchange="updateSet('${exId}',${setIndex},'weight',this.value)"/>
    <span style="color:var(--muted);font-size:12px">×</span>
    <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
      onchange="updateSet('${exId}',${setIndex},'reps',this.value)"/>
    <button class="drop-set-link" onclick="addDropSet('${exId}', ${setIndex}, 0, this)">↓ drop</button>
    <button class="set-notes-toggle" onclick="toggleSetNote(this, '${exId}', ${setIndex})">✎ note</button>`;
  container.appendChild(div);
  const noteArea = document.createElement('div');
  noteArea.className = 'set-notes-area';
  noteArea.id = `set-note-area-${exId}-${setIndex}`;
  noteArea.innerHTML = `<textarea class="set-note-input" placeholder="How did that feel? Anything to note..." oninput="updateSetNote('${exId}', ${setIndex}, this.value)"></textarea>`;
  container.appendChild(noteArea);
  const dropContainer = document.createElement('div');
  dropContainer.id = `drops-${exId}-${setIndex}-0`;
  container.appendChild(dropContainer);
}

async function saveDay() {
  const day = PROGRAM[currentDay];
  if (day.rest) return;
  const variant = getCurrentVariant(currentDay);
  const savedDayIndex = currentDay;
  let prMsg = null;

  try {
    const dateEl = document.getElementById('sessionDate');
    sessionLogs._date = dateEl ? dateEl.value : new Date().toISOString().split('T')[0];
    const feelEl = document.getElementById('feelSlider');
    const notesEl = document.getElementById('sessionNotes');
    if (feelEl) sessionLogs._feel = parseInt(feelEl.value);
    if (notesEl) sessionLogs._notes = notesEl.value;
    await saveToDB('log_' + variant.id, sessionLogs);

    // Collect exercise ids from BOTH the static program AND any dynamically
    // added exercise cards (picked from history, deload extras, burn finisher,
    // or randomized accessories) so per-exercise history is written for all of
    // them, not just exercises defined in the original weekly program.
    const staticIds = new Set();
    variant.sections.forEach(section => {
      section.exercises.forEach(ex => {
        const exercises = ex.superset ? ex.exercises : [ex];
        exercises.forEach(e => staticIds.add(e.id));
      });
    });
    const domIds = new Set();
    document.querySelectorAll('.exercise-card[data-exid]').forEach(card => {
      if (card.dataset.exid) domIds.add(card.dataset.exid);
    });
    const allExerciseIds = new Set([...staticIds, ...domIds]);

    allExerciseIds.forEach(exId => {
      if (sessionLogs[exId] && sessionLogs[exId].sets && sessionLogs[exId].sets.length) {
        const hist = JSON.parse(localStorage.getItem('hist_' + exId) || '[]');
        // Tag deload-week sets so suggestion logic can skip them — deload
        // weights are deliberately lightened and should never be mistaken
        // for a real "last session" reference point.
        hist.push({ date: sessionLogs._date, sets: sessionLogs[exId].sets, heavy: variant.tag === 'heavy', deload: isDeloadWeek, notes: (sessionLogs[exId].sets || []).map(s => s.note || '').filter(Boolean) });
        if (hist.length > 12) hist.shift();
        localStorage.setItem('hist_' + exId, JSON.stringify(hist));
      }
    });

    const histKey = getHistKey(variant);
    const allSessions = JSON.parse(localStorage.getItem(histKey) || '[]');

    // Build superset group map by reading the LIVE DOM, not the static program data.
    // This captures the actual on-screen arrangement including any pairs made via
    // "Pair Existing Exercises" or "Add Superset", and reflects manual reordering.
    const mainEl = document.getElementById('mainContent');
    const exIdToGroup = {};       // preset exercise id -> group id
    const customIdxToGroup = {};  // custom exercise array index -> group id
    let domGroupCounter = 0;

    if (mainEl) {
      mainEl.querySelectorAll('.superset-block').forEach(block => {
        const groupId = 'ss-' + (domGroupCounter++);
        // Preset cards inside this block
        block.querySelectorAll('.exercise-card[data-exid]').forEach(card => {
          exIdToGroup[card.dataset.exid] = groupId;
        });
        // Custom cards inside this block
        block.querySelectorAll('.custom-exercise-card').forEach(card => {
          const idx = card.id ? parseInt(card.id.replace('custom-ex-', '')) : null;
          if (idx !== null && !isNaN(idx)) customIdxToGroup[idx] = groupId;
        });
      });
    }

    // Build sessionExercises by walking the LIVE DOM in actual visual order,
    // so preset and custom exercises that are supersetted together end up
    // consecutive in the saved array regardless of which type they are or
    // which "loop" they'd normally come from.
    const sessionExercises = [];
    if (mainEl) {
      const allCards = [...mainEl.querySelectorAll('.exercise-card[data-exid], .custom-exercise-card')];
      allCards.forEach(card => {
        if (card.classList.contains('exercise-card')) {
          const eId = card.dataset.exid;
          const log = sessionLogs[eId];
          if (log && log.sets && log.sets.some(s => s.weight || s.reps)) {
            const customName = localStorage.getItem('name_' + eId);
            // Look up the original exercise object for its default name as fallback.
            // Checks the normal program sections first, then deload extras and the
            // burn finisher, since those exercises aren't part of variant.sections.
            let defaultName = customName;
            if (!defaultName) {
              variant.sections.forEach(section => {
                section.exercises.forEach(ex => {
                  const exList = ex.superset ? ex.exercises : [ex];
                  exList.forEach(e => { if (e.id === eId) defaultName = e.name; });
                });
              });
            }
            if (!defaultName) {
              getDeloadExtras(variant.id).forEach(e => { if (e.id === eId) defaultName = e.name; });
            }
            if (!defaultName) {
              const bf = getBurnFinisher(variant.id);
              if (bf && bf.id === eId) defaultName = bf.name;
            }
            // Also check ACCESSORY_POOLS (the randomizer's exercise pools) —
            // an exercise added via "Randomize Accessories" can come from a
            // DIFFERENT day's pool than the one currently open (e.g. a
            // Monday-specific exercise ID landing on a Thursday leg day),
            // so it wouldn't be found in variant.sections above at all.
            if (!defaultName && typeof ACCESSORY_POOLS !== 'undefined') {
              Object.values(ACCESSORY_POOLS).forEach(pool => {
                pool.forEach(e => { if (e.id === eId) defaultName = e.name; });
              });
            }
            sessionExercises.push({ name: defaultName || eId, sets: log.sets, supersetGroup: exIdToGroup[eId] || null });
          }
        } else if (card.classList.contains('custom-exercise-card')) {
          const idx = card.id ? parseInt(card.id.replace('custom-ex-', '')) : null;
          if (idx === null || isNaN(idx)) return;
          const ex = (sessionLogs._custom || [])[idx];
          if (ex && ex.name && ex.sets && ex.sets.some(s => s.weight || s.reps)) {
            sessionExercises.push({ ...ex, supersetGroup: customIdxToGroup[idx] || null });
          }
        }
      });
    }

    if (sessionExercises.length) {
      allSessions.push({
        date: sessionLogs._date,
        week: isDeloadWeek ? '🔋 DELOAD' : ((variant.tag === 'heavy' ? 'HEAVY' : 'VOLUME') + ' · ' + (isWeekA ? 'Week A' : 'Week B')),
        feel: sessionLogs._feel || null,
        notes: sessionLogs._notes || '',
        exercises: sessionExercises
      });
      if (allSessions.length > 8) allSessions.shift();
      localStorage.setItem(histKey, JSON.stringify(allSessions));
    }

    const newPRs = checkForPRs(variant, sessionLogs);
    prMsg = newPRs.length > 0
      ? (newPRs.length === 1 ? '🏆 New PR — ' + newPRs[0].name + ' ' + newPRs[0].weight + 'lbs × ' + newPRs[0].reps + '!' : '🏆 ' + newPRs.length + ' New PRs this session!')
      : null;

    // Save a snapshot of today's accessories so next time this exact day type
    // comes around, it defaults to what was actually logged instead of the
    // static program list — while Randomize Accessories still works on top.
    captureAccessoriesSnapshot(variant, savedDayIndex);
  } catch (err) {
    console.error('saveDay error (data was still saved, continuing to clear):', err);
  }

  // ALWAYS run, even if something above threw an error
  const dot = document.getElementById('dot-' + savedDayIndex);
  if (dot) dot.classList.add('has-log');
  showSaveSuccess(prMsg);
  sessionLogs = {};
  justSavedDay = savedDayIndex;
  renderDay(savedDayIndex);
}
