// ─── DROP SETS ────────────────────────────────────────────────
function buildDropSetRow(exId, setIdx, dropIdx, weight, reps, depth) {
  const indent = depth * 20;
  const id = `drops-${exId}-${setIdx}-${dropIdx + 1}`;
  return `<div class="drop-set-row" style="padding-left:${20 + indent}px;" id="droprow-${exId}-${setIdx}-${dropIdx}">
    <span class="drop-set-label">D${dropIdx + 1}</span>
    <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
      value="${weight||''}" onchange="updateDropSet('${exId}',${setIdx},${dropIdx},'weight',this.value)"/>
    <span style="color:var(--muted);font-size:12px">×</span>
    <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
      value="${reps||''}" onchange="updateDropSet('${exId}',${setIdx},${dropIdx},'reps',this.value)"/>
    <button class="drop-set-link" onclick="addDropSet('${exId}', ${setIdx}, ${dropIdx + 1}, this)">↓ drop</button>
    <button class="drop-set-remove" onclick="removeDropSet('${exId}',${setIdx},${dropIdx},this)">✕</button>
  </div>
  <div id="${id}"></div>`;
}

function addDropSet(exId, setIdx, dropIdx, btn) {
  // Find or create drops array on the set
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  while (sessionLogs[exId].sets.length <= setIdx) sessionLogs[exId].sets.push({ weight:'', reps:'' });
  if (!sessionLogs[exId].sets[setIdx].drops) sessionLogs[exId].sets[setIdx].drops = [];

  // Insert new drop at dropIdx position
  sessionLogs[exId].sets[setIdx].drops.splice(dropIdx, 0, { weight:'', reps:'' });

  // Find container to insert into
  const containerId = dropIdx === 0
    ? `drops-${exId}-${setIdx}-0`
    : `drops-${exId}-${setIdx}-${dropIdx}`;

  const container = document.getElementById(containerId);
  if (!container) return;

  const div = document.createElement('div');
  div.innerHTML = buildDropSetRow(exId, setIdx, dropIdx, '', '', 0);
  container.insertAdjacentHTML('beforeend', buildDropSetRow(exId, setIdx, dropIdx, '', '', 0));
}

function updateDropSet(exId, setIdx, dropIdx, field, value) {
  if (!sessionLogs[exId] || !sessionLogs[exId].sets[setIdx] || !sessionLogs[exId].sets[setIdx].drops) return;
  if (sessionLogs[exId].sets[setIdx].drops[dropIdx]) {
    sessionLogs[exId].sets[setIdx].drops[dropIdx][field] = value;
  }
}

function removeDropSet(exId, setIdx, dropIdx, btn) {
  const row = document.getElementById(`droprow-${exId}-${setIdx}-${dropIdx}`);
  const container = document.getElementById(`drops-${exId}-${setIdx}-${dropIdx + 1}`);
  if (row) row.remove();
  if (container) container.remove();
  if (sessionLogs[exId] && sessionLogs[exId].sets[setIdx] && sessionLogs[exId].sets[setIdx].drops) {
    sessionLogs[exId].sets[setIdx].drops.splice(dropIdx, 1);
  }
}

// ─── ANCHOR LIFTS FOR PROGRESS ────────────────────────────────
// Every genuine anchor lift across the current 5-day split, pulled directly
// from the actual anchor:true exercises in PROGRAM — kept in sync manually
// whenever the program structure changes, since this list previously went
// stale after a restructure and silently broke Coach's plateau detection.
const ANCHOR_LIFTS = [
  { id: 'squat', name: 'Barbell Squat (Heavy)' },
  { id: 'squat-mon-b', name: 'Barbell Squat (Volume)' },
  { id: 'smith-lunge', name: 'Smith Machine Lunges (Heavy)' },
  { id: 'smith-lunge-thu', name: 'Smith Machine Lunges (Heavy Fri)' },
  { id: 'bulgarian-mon', name: 'Bulgarian Split Squat (Smith)' },
  { id: 'rdl', name: 'Romanian Deadlift (Volume)' },
  { id: 'rdl-thu-heavy', name: 'Romanian Deadlift (Heavy)' },
  { id: 'incline-smith', name: 'Incline Smith Press' },
  { id: 'flat-smith', name: 'Flat Smith Press' },
  { id: 'smith-shoulder-press-vol', name: 'Smith Machine Shoulder Press' },
  { id: 'wtd-pullup', name: 'Weighted Pull Ups (Heavy)' },
  { id: 'wtd-pullup-vol-wed', name: 'Weighted Pull Ups (Volume)' },
  { id: 'barbell-row-sat', name: 'Barbell Row (Upper Day)' },
];

// Real logged data always wins over the built-in seed/placeholder history.
// Seed data is ONLY used as a fallback when an exercise has never been logged
// for real, so old placeholder dates can never contaminate or out-rank actual
// sessions once they exist.
// Real logged data always wins over the built-in seed/placeholder history.
// Deload-week sets are EXCLUDED by default since they're deliberately
// lightened weights and should never be mistaken for a real "last session"
// reference point in suggestions, PRs, or progress charts. Pass
// includeDeload=true explicitly for the rare case a caller actually wants
// deload sets included (e.g. showing full session history in Past Sessions).
function getAllHistory(exId, includeDeload) {
  const stored = JSON.parse(localStorage.getItem('hist_' + exId) || '[]');
  const filtered = includeDeload ? stored : stored.filter(s => !s.deload);
  if (filtered.length > 0) {
    return [...filtered].sort((a, b) => a.date > b.date ? 1 : -1);
  }
  // If ALL real entries happen to be deload-only, fall back to including them
  // rather than silently returning nothing — better to show something than
  // pretend there's no history at all.
  if (!includeDeload && stored.length > 0) {
    return [...stored].sort((a, b) => a.date > b.date ? 1 : -1);
  }
  const builtin = HISTORY[exId] || [];
  return [...builtin].sort((a, b) => a.date > b.date ? 1 : -1);
}

function epley1RM(weight, reps) {
  return weight * (1 + reps / 30);
}

function getLifePR(exId) {
  const all = getAllHistory(exId);
  let pr = null;
  let prEstimate = 0;
  all.forEach(session => {
    if (!session.sets) return;
    const reps = session.sets.map(s => parseInt(s.reps)).filter(r => !isNaN(r));
    const avgReps = reps.length ? reps.reduce((a,b) => a+b,0) / reps.length : 0;
    const isHeavy = session.heavy !== undefined ? session.heavy : avgReps <= 8;
    if (!isHeavy) return;
    session.sets.forEach(s => {
      const w = parseFloat(s.weight);
      const r = parseInt(s.reps);
      if (isNaN(w) || isNaN(r) || w <= 0 || r <= 0) return;
      const est = epley1RM(w, r);
      if (est > prEstimate) {
        prEstimate = est;
        pr = { weight: w, reps: r, date: session.date, estimated1RM: Math.round(est) };
      }
    });
  });
  return pr;
}


// ─── COACH: PLATEAU DETECTION & RECOMMENDATIONS ─────────────────

// Analyzes an individual anchor lift's estimated-1RM trend across its last
// several REAL (non-deload) sessions to detect a plateau — defined as no
// meaningful improvement in estimated 1RM over at least 3 consecutive
// sessions, with the most recent session not exceeding the best of the
// prior ones by more than a small margin.
function analyzeLiftTrend(exId, exName) {
  const all = getAllHistory(exId).filter(s => s.sets && s.sets.length);
  if (all.length < 3) return null; // not enough data to call a trend

  // Track which display name each session's sets were logged under (via
  // localStorage name_ overrides at save time isn't stored per-set, so we
  // approximate using the CURRENT name override, if any exists, applied
  // uniformly — this catches the common case of "this ID has been renamed
  // at some point" without needing per-session name tracking we don't have).
  const currentDisplayName = localStorage.getItem('name_' + exId) || exName;

  let sessionBest1RMs = all.map(session => {
    let best = 0;
    session.sets.forEach(s => {
      if (s.isBurnout) return; // exclude intentionally light/high-rep burnout sets from trend analysis
      const w = parseFloat(s.weight), r = parseInt(s.reps);
      if (!isNaN(w) && !isNaN(r) && w > 0 && r > 0) {
        // Epley 1RM gets increasingly unreliable above ~10 reps. Cap the
        // effective rep count used in the formula at 10, so a genuinely
        // higher-rep set (e.g. 14 reps) doesn't get an inflated or wildly
        // different 1RM estimate compared to a similar-effort lower-rep set.
        const cappedReps = Math.min(r, 10);
        const est = w * (1 + cappedReps / 30);
        if (est > best) best = est;
      }
    });
    return { date: session.date, est1RM: best };
  }).filter(s => s.est1RM > 0);

  if (sessionBest1RMs.length < 3) return null;

  // Filter out sessions that look like contaminated/mislabeled data — e.g. a
  // renamed lighter exercise that briefly wrote into this exercise's history,
  // or a genuinely different movement variation sharing this ID. A single
  // session with an estimated 1RM far below the exercise's typical range
  // shouldn't be allowed to skew the whole trend. Uses the MEDIAN of all
  // sessions as the reference point (robust to outliers, unlike a mean),
  // and drops anything below 50% of that median.
  const sorted1RMs = [...sessionBest1RMs].map(s => s.est1RM).sort((a, b) => a - b);
  const median1RM = sorted1RMs[Math.floor(sorted1RMs.length / 2)];
  const outlierFloor = median1RM * 0.5;
  const beforeOutlierFilter = sessionBest1RMs.length;
  sessionBest1RMs = sessionBest1RMs.filter(s => s.est1RM >= outlierFloor);
  const outliersDropped = beforeOutlierFilter - sessionBest1RMs.length;

  if (sessionBest1RMs.length < 3) return null; // not enough clean data left

  // Low-confidence flag: if we had to drop a meaningful chunk of sessions as
  // outliers, or the remaining data still has wide swings between sessions
  // (a sign of genuinely different exercise variations sharing this ID that
  // weren't extreme enough to hit the outlier floor), don't show a confident
  // up/down verdict — surface it as low-confidence instead of misleading.
  const recent = sessionBest1RMs.slice(-4);
  const recentValues = recent.map(s => s.est1RM);
  const recentMax = Math.max(...recentValues);
  const recentMin = Math.min(...recentValues);
  const recentSpread = recentMax > 0 ? (recentMax - recentMin) / recentMax : 0;
  const isLowConfidence = outliersDropped > 0 || recentSpread > 0.35;

  const mostRecent = recent[recent.length - 1].est1RM;
  const priorBest = Math.max(...recent.slice(0, -1).map(s => s.est1RM));
  const priorFirst = recent[0].est1RM;

  const pctChangeFromStart = ((mostRecent - priorFirst) / priorFirst) * 100;
  const isPlateaued = mostRecent <= priorBest * 1.02; // within 2% of prior best = no real progress
  const isDeclining = mostRecent < priorFirst * 0.97; // more than 3% below where this window started

  // Determine which day type this exercise's MOST RECENT session was logged
  // under, so Coach can flag "this 1RM is from a volume-day top set, not
  // directly comparable to a heavy-day 1RM" per the spec. Also detect if
  // BOTH heavy and volume sessions are mixed into the same trend window,
  // which is itself a low-confidence signal since the two aren't comparable.
  const mostRecentRawSession = all[all.length - 1];
  const dayType = mostRecentRawSession && mostRecentRawSession.heavy ? 'Heavy' : 'Volume';
  const recentHeavyFlags = new Set(recent.map((s, i) => {
    // recent came from sessionBest1RMs which doesn't carry the heavy flag —
    // look it up from the matching raw session by date.
    const rawMatch = all.find(raw => raw.date === s.date);
    return rawMatch ? !!rawMatch.heavy : null;
  }));
  const mixedDayTypes = recentHeavyFlags.size > 1;

  return {
    exName: currentDisplayName,
    exId,
    sessionsAnalyzed: recent.length,
    mostRecent: Math.round(mostRecent),
    priorBest: Math.round(priorBest),
    pctChange: Math.round(pctChangeFromStart * 10) / 10,
    isPlateaued,
    isDeclining,
    isLowConfidence: isLowConfidence || mixedDayTypes,
    dayType, // 'Heavy' or 'Volume' — which type the most recent 1RM came from
    mixedDayTypes, // true if this trend window mixes heavy and volume sessions
  };
}

// Scans recent feel ratings across ALL session history (any muscle group) for
// a declining trend — comparing the average of the last 3 sessions against
// the average of the 3 before that.
function analyzeFeelTrend() {
  const allSessions = [];
  Object.keys(localStorage).forEach(key => {
    if (!key.startsWith('hist_session_')) return;
    try {
      const sessions = JSON.parse(localStorage.getItem(key));
      sessions.forEach(s => { if (typeof s.feel === 'number') allSessions.push(s); });
    } catch(e) {}
  });
  allSessions.sort((a, b) => a.date > b.date ? 1 : -1);
  if (allSessions.length < 6) return null;

  const last3 = allSessions.slice(-3);
  const prior3 = allSessions.slice(-6, -3);
  const last3Avg = last3.reduce((a,s) => a + s.feel, 0) / last3.length;
  const prior3Avg = prior3.reduce((a,s) => a + s.feel, 0) / prior3.length;

  return {
    last3Avg: Math.round(last3Avg * 10) / 10,
    prior3Avg: Math.round(prior3Avg * 10) / 10,
    isDeclining: last3Avg < prior3Avg - 0.5,
    lastSessionDates: last3.map(s => s.date),
  };
}

// Builds the full set of coach observations: per-lift plateau flags, feel
// trend, and time-since-last-deload, then turns those into specific,
// opinionated written recommendations rather than raw numbers.
// Discovers every exercise that has appeared 3+ times across ALL session
// history (not just the fixed ANCHOR_LIFTS list), so accessories that get
// logged consistently — Face Pull, Leg Extension, Smith Shrug, etc. — get
// real trend coverage too, not just anchor lifts. Resolves each discovered
// name back to its real exercise ID via the existing name-to-id map so
// analyzeLiftTrend can run against its actual hist_<id> data.
function discoverTrendableExercises() {
  const nameCounts = {}; // normalized name -> count of sessions it appeared in
  const displayNames = {}; // normalized name -> best display name seen

  Object.keys(localStorage).forEach(key => {
    if (!key.startsWith('hist_session_')) return;
    let sessions;
    try { sessions = JSON.parse(localStorage.getItem(key)); } catch(e) { return; }
    if (!Array.isArray(sessions)) return;
    sessions.forEach(session => {
      (session.exercises || []).forEach(ex => {
        if (!ex.name || ex.name.startsWith('dl-') || ex.name.startsWith('burn-')) return;
        const norm = normalizeExerciseName(ex.name);
        nameCounts[norm] = (nameCounts[norm] || 0) + 1;
        if (!displayNames[norm] || ex.name.length > displayNames[norm].length) {
          displayNames[norm] = ex.name;
        }
      });
    });
  });

  const nameToId = buildExerciseNameToIdMap();
  const trendable = [];
  const seenIds = new Set();

  Object.entries(nameCounts).forEach(([norm, count]) => {
    if (count < 3) return; // needs 3+ appearances to trend, per spec
    const id = nameToId[norm];
    if (!id || seenIds.has(id)) return; // no resolvable id, or already covered by ANCHOR_LIFTS
    seenIds.add(id);
    trendable.push({ id, name: displayNames[norm] });
  });

  return trendable;
}

function generateCoachReport() {
  // Combine the fixed anchor lifts with every accessory that's appeared
  // 3+ times, so trend coverage extends across the whole program instead
  // of just anchors — directly addressing the "missing lower chest, rear
  // delts, traps, forearms" gap.
  const anchorIds = new Set(ANCHOR_LIFTS.map(l => l.id));
  const discoveredAccessories = discoverTrendableExercises().filter(ex => !anchorIds.has(ex.id));
  const allTrendableLifts = [...ANCHOR_LIFTS, ...discoveredAccessories];

  const liftAnalyses = allTrendableLifts
    .map(lift => analyzeLiftTrend(lift.id, lift.name))
    .filter(Boolean);

  // Low-confidence lifts are excluded from ALL trend-based recommendations —
  // we explicitly don't trust their up/down verdict enough to write a
  // recommendation about them, even though they still show up in the raw
  // lift list with a neutral "low confidence" flag.
  const confidentAnalyses = liftAnalyses.filter(l => !l.isLowConfidence);
  const plateaued = confidentAnalyses.filter(l => l.isPlateaued && !l.isDeclining);
  const declining = confidentAnalyses.filter(l => l.isDeclining);
  const progressing = confidentAnalyses.filter(l => !l.isPlateaued && !l.isDeclining);

  const feelTrend = analyzeFeelTrend();

  const recommendations = [];

  if (declining.length > 0) {
    recommendations.push({
      type: 'warning',
      title: '⚠️ Declining lifts detected',
      body: `${declining.map(l => l.exName).join(', ')} ${declining.length === 1 ? 'is' : 'are'} trending down over your last few sessions, not just flat. This is usually fatigue accumulation rather than a real strength loss. If a deload isn't coming up soon, consider backing off intentionally on ${declining.length === 1 ? 'this lift' : 'these lifts'} for a session or two.`
    });
  }

  if (plateaued.length >= 2) {
    recommendations.push({
      type: 'plateau',
      title: '📊 Multiple lifts plateaued',
      body: `${plateaued.map(l => l.exName).join(', ')} haven't meaningfully improved in your last few sessions. When several lifts stall at once like this, it's usually systemic — worth checking sleep, stress, and whether your last deload actually gave you enough recovery. A single stalled lift is normal; several at once is a signal.`
    });
  } else if (plateaued.length === 1) {
    recommendations.push({
      type: 'plateau',
      title: `📊 ${plateaued[0].exName} has plateaued`,
      body: `Estimated 1RM hasn't moved much over your last ${plateaued[0].sessionsAnalyzed} sessions (currently ~${plateaued[0].mostRecent}lbs vs ~${plateaued[0].priorBest}lbs). Try a rep-range change for a few weeks — if you've been in the 6-8 range, drop to 4-6 with slightly heavier weight, or vice versa — before assuming you need more recovery.`
    });
  }

  if (feelTrend && feelTrend.isDeclining) {
    recommendations.push({
      type: 'fatigue',
      title: '😓 Feel ratings trending down',
      body: `Your last 3 sessions averaged ${feelTrend.last3Avg}/10 vs ${feelTrend.prior3Avg}/10 the 3 before that. Combined with ${declining.length > 0 || plateaued.length > 0 ? 'the plateau signals above' : 'no major strength plateau yet'}, this looks like accumulated fatigue. Consider whether your next deload should come earlier than the usual 4-week mark.`
    });
  }

  if (progressing.length > 0 && plateaued.length === 0 && declining.length === 0) {
    recommendations.push({
      type: 'good',
      title: '✅ Trending up across the board',
      body: `${progressing.map(l => l.exName).join(', ')} ${progressing.length === 1 ? 'is' : 'are'} all showing real progress. Whatever you're doing right now is working — no changes needed. Keep logging so we catch it early if this shifts.`
    });
  }

  if (recommendations.length === 0) {
    recommendations.push({
      type: 'neutral',
      title: '📋 Not enough data yet',
      body: `Keep logging consistently — plateau detection needs at least 3-4 sessions per lift to spot real trends versus normal day-to-day variation. Check back in a couple weeks.`
    });
  }

  return { liftAnalyses, feelTrend, recommendations };
}


// ─── COACH CHAT: DATA SUMMARY FOR AI CONTEXT ────────────────────

// Builds a compact text summary of the person's training data — recent
// sessions, anchor lift trends, feel ratings — to send as context alongside
// every chat message, so the AI coach can reference real numbers without
// needing the full raw history (which would be far too large to send).
function buildCoachDataSummary() {
  const report = generateCoachReport();
  const lines = [];

  lines.push("LIFT TRENDS — anchors AND accessories logged 3+ times (estimated 1RM, from most recent real sessions):");
  report.liftAnalyses.forEach(l => {
    let status;
    if (l.mixedDayTypes) {
      status = 'low-confidence — mixes heavy-day and volume-day sessions, which use different rep ranges and are not directly comparable as a single 1RM trend';
    } else if (l.isLowConfidence) {
      status = 'low-confidence (mixed exercise variations may be logged under this name, do not treat as a firm trend)';
    } else {
      status = l.isDeclining ? 'declining' : l.isPlateaued ? 'plateaued' : 'progressing';
    }
    lines.push(`- ${l.exName} [${l.dayType} day]: ~${l.mostRecent}lbs est. (${status}, was ~${l.priorBest}lbs a few sessions ago)`);
  });

  if (report.feelTrend) {
    lines.push(`\nFEEL RATING TREND: last 3 sessions averaged ${report.feelTrend.last3Avg}/10 vs ${report.feelTrend.prior3Avg}/10 the 3 before that.`);
  }

  lines.push("\nRECENT SESSION HISTORY (last 2 sessions per day-type — read the [DAY TYPE] label carefully, it tells you whether this was a HEAVY day, lower reps/higher weight by design, or a VOLUME day, higher reps/lighter weight by design — these are intentionally different targets, not inconsistency):");
  ['push', 'pull', 'legs'].forEach(muscle => {
    ['heavy', 'volume'].forEach(tag => {
      const key = 'hist_session_' + muscle + '-' + tag;
      let sessions;
      try { sessions = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { sessions = []; }
      sessions.slice(-2).forEach(s => {
        const dayTypeLabel = `[DAY TYPE: ${muscle.toUpperCase()} — ${tag.toUpperCase()}]`;
        const feelLabel = s.feel ? ` [FEEL RATING: ${s.feel}/10]` : '';
        lines.push(`\n- ${s.date} ${dayTypeLabel}${feelLabel}`);

        // Exercise order is meaningful: it reflects the actual sequence performed
        // that session, listed as EXERCISE_ORDER so the coach knows this isn't
        // an arbitrary list — position matters for fatigue/sequencing questions.
        (s.exercises || []).forEach((ex, idx) => {
          const sets = (ex.sets || []).filter(st => st.weight || st.reps).map(st => {
            const burnoutTag = st.isBurnout ? ' [BURNOUT SET — not a working set, exclude from strength assessment]' : '';
            return `${st.weight||'BW'}x${st.reps||'?'}${burnoutTag}`;
          }).join(', ');
          lines.push(`  EXERCISE_ORDER[${idx + 1}] ${ex.name}: ${sets}`);
          // Attribute notes explicitly and unambiguously as Bryce's own words,
          // not external commentary, since these are his in-the-moment
          // observations logged during the actual set.
          const setNotes = (ex.sets || []).map(st => st.note).filter(Boolean);
          if (setNotes.length) {
            setNotes.forEach(note => {
              lines.push(`    BRYCE'S OWN NOTE (his words, logged during this set): "${note}"`);
            });
          }
        });

        if (s.notes) {
          lines.push(`  BRYCE'S OWN SESSION NOTE (his words, logged at end of session): "${s.notes}"`);
        }
        if (s.coachNotes) {
          lines.push(`  PREVIOUS COACH ADVICE (what you or a prior coach conversation told Bryce about this specific session): "${s.coachNotes}"`);
        }
      });
    });
  });

  lines.push(`\nCURRENT WEEK: ${isDeloadWeek ? 'DELOAD week (all weights intentionally reduced 60-70% — do not flag lighter-than-usual weights as a decline this week)' : (isWeekA ? 'Week A' : 'Week B')}`);

  return lines.join('\n');
}

// ─── COACH CHAT: CONVERSATION STATE & PERSISTENCE ───────────────

function getCoachChatHistory() {
  try { return JSON.parse(localStorage.getItem('coach_chat_history') || '[]'); } catch(e) { return []; }
}

function saveCoachChatHistory(messages) {
  // Keep last 40 messages (20 exchanges) to avoid unbounded growth while
  // still preserving plenty of context for follow-up questions.
  const trimmed = messages.slice(-40);
  localStorage.setItem('coach_chat_history', JSON.stringify(trimmed));
}

function clearCoachChat() {
  if (!confirm('Clear the whole conversation with your Coach? This can\'t be undone.')) return;
  localStorage.removeItem('coach_chat_history');
  showCoachTab();
}

async function sendCoachMessage() {
  const input = document.getElementById('coachChatInput');
  if (!input) return;
  const userText = input.value.trim();
  if (!userText) return;

  const messages = getCoachChatHistory();
  messages.push({ role: 'user', content: userText });
  saveCoachChatHistory(messages);
  input.value = '';
  renderCoachChatMessages();

  const chatBody = document.getElementById('coachChatMessages');
  if (chatBody) {
    chatBody.insertAdjacentHTML('beforeend', `<div class="coach-msg coach-msg-loading" id="coach-loading-msg">
      <div class="coach-msg-bubble coach-bubble-assistant">Thinking...</div>
    </div>`);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  try {
    const dataSummary = buildCoachDataSummary();
    const systemPrompt = `You are Bryce's personal strength training coach inside his custom training log app. You have access to his real training data below. Use it when relevant to his question — reference actual numbers, trends, and exercises. If his question has nothing to do with his training data, just answer normally without forcing in data references. Be direct and opinionated like a real coach, not vague or hedgy. Keep responses concise — a few sentences to a short paragraph, not an essay, since this is a mobile chat interface.

HOW TO READ THE DATA BELOW — read this carefully before answering:
- Every session is labeled with [DAY TYPE: MUSCLE — HEAVY or VOLUME]. Heavy days are intentionally lower reps/heavier weight; volume days are intentionally higher reps/lighter weight. A volume-day set having more reps than a heavy-day set is BY DESIGN, not a sign of anything wrong — never flag this as an inconsistency.
- EXERCISE_ORDER[n] shows the actual sequence exercises were performed in that session. Position matters — an exercise later in the sequence may show reduced performance purely from accumulated fatigue that session, not a real capability decline.
- Sets tagged [BURNOUT SET] are deliberately light, high-rep finisher sets Bryce adds on top of his real working sets. Never use these to judge strength, plateaus, or trends — they're intentionally not representative.
- Lines marked "BRYCE'S OWN NOTE" or "BRYCE'S OWN SESSION NOTE" are his direct, first-person words logged in the moment. Treat these as ground truth about how he felt — they are not external commentary or anyone else's observations.
- Anchor lifts marked "low-confidence" in the trends section have inconsistent underlying data (e.g. different exercise variations may have been logged under the same name) — do not present these as a firm trend either direction; say the data isn't clean enough for a confident read if asked.
- If the current week is a DELOAD week, all weights are intentionally reduced — never interpret a lighter deload-week weight as a strength decline.
- Lines marked "PREVIOUS COACH ADVICE" are things Bryce logged after asking about that specific session in an earlier conversation. Use this for continuity — reference it if relevant, and don't repeat the exact same advice without acknowledging you already said it.

BRYCE'S CURRENT TRAINING DATA:
${dataSummary}`;

    const apiMessages = messages.slice(-20).map(m => ({ role: m.role, content: m.content }));

    // Calls the Cloudflare Worker proxy instead of Anthropic directly, so the
    // API key stays server-side and never touches the browser/client code.
    const response = await fetch("https://wandering-shape-ccb7.brycea2002.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: systemPrompt,
        messages: apiMessages,
      })
    });

    const data = await response.json();
    const loadingMsg = document.getElementById('coach-loading-msg');
    if (loadingMsg) loadingMsg.remove();

    const replyText = data.content
      .filter(block => block.type === 'text')
      .map(block => block.text)
      .join('\n') || "Sorry, I didn't get a response. Try again?";

    const updatedMessages = getCoachChatHistory();
    updatedMessages.push({ role: 'assistant', content: replyText });
    saveCoachChatHistory(updatedMessages);
    renderCoachChatMessages();
  } catch (err) {
    console.error('Coach chat error:', err);
    const loadingMsg = document.getElementById('coach-loading-msg');
    if (loadingMsg) loadingMsg.remove();
    const chatBody2 = document.getElementById('coachChatMessages');
    if (chatBody2) {
      chatBody2.insertAdjacentHTML('beforeend', `<div class="coach-msg"><div class="coach-msg-bubble coach-bubble-assistant" style="color:#ff6b6b;">Something went wrong reaching the coach. Try again in a moment.</div></div>`);
    }
  }
}

function renderCoachChatMessages() {
  const chatBody = document.getElementById('coachChatMessages');
  if (!chatBody) return;
  const messages = getCoachChatHistory();
  chatBody.innerHTML = messages.map(m => `
    <div class="coach-msg">
      <div class="coach-msg-bubble coach-bubble-${m.role}">${m.content.replace(/\n/g, '<br>')}</div>
    </div>
  `).join('');
  chatBody.scrollTop = chatBody.scrollHeight;
}

function showCoachTab() {
  // Force any actively-focused input to blur FIRST, so its onchange handler
  // commits the typed value into sessionLogs before we tear down the DOM.
  // Without this, tapping the Coach tab directly out of a weight/rep field
  // can race the blur event against the DOM rebuild below and silently
  // lose whatever was just typed.
  if (document.activeElement && typeof document.activeElement.blur === 'function') {
    document.activeElement.blur();
  }

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const ctab = document.getElementById('coach-tab-btn');
  if (ctab) ctab.classList.add('active');

  const main = document.getElementById('mainContent');
  const report = generateCoachReport();

  const typeColors = {
    warning: '#ff6b6b', plateau: 'var(--orange)', fatigue: '#ff9f4a',
    good: 'var(--accent)', neutral: 'var(--muted)'
  };

  const recsHtml = report.recommendations.map(rec => `
    <div style="background:var(--card2);border:1px solid ${typeColors[rec.type]}40;border-left:3px solid ${typeColors[rec.type]};border-radius:10px;padding:14px 16px;margin-bottom:12px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:${typeColors[rec.type]};margin-bottom:6px;">${rec.title}</div>
      <div style="font-size:13px;color:var(--white);line-height:1.6;">${rec.body}</div>
    </div>
  `).join('');

  const liftRowsHtml = report.liftAnalyses.map(l => {
    const dayTypeTag = `<span style="font-size:9px;color:var(--muted);margin-left:6px;">(${l.dayType})</span>`;
    // Low-confidence trends (mixed exercise variations, contaminated
    // sessions we had to filter out, OR heavy+volume sessions mixed into
    // the same trend window) show a neutral flag instead of a confident
    // up/down verdict, since the underlying data isn't reliable enough or
    // comparable enough for a real trend call.
    if (l.isLowConfidence) {
      const reason = l.mixedDayTypes
        ? 'This mixes heavy-day and volume-day sessions, which use different rep ranges and aren\'t directly comparable as a 1RM trend.'
        : 'Recent sessions vary too much to trend confidently — may include different exercise variations logged under the same name.';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:13px;color:var(--white);">${l.exName}${dayTypeTag}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);" title="${reason}">❓ low confidence</span>
      </div>`;
    }
    const statusIcon = l.isDeclining ? '📉' : l.isPlateaued ? '➡️' : '📈';
    const statusColor = l.isDeclining ? '#ff6b6b' : l.isPlateaued ? 'var(--orange)' : 'var(--accent)';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:13px;color:var(--white);">${l.exName}${dayTypeTag}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${statusColor};">${statusIcon} ${l.mostRecent}lbs est.</span>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="progress-container">
      <div class="progress-header">
        <div class="progress-title">COACH</div>
        <div class="progress-subtitle">Plateau detection & recommendations, based on your logged history</div>
      </div>
      <div style="padding:0 20px 20px;">
        ${recsHtml}
        ${liftRowsHtml ? `<div style="margin-top:20px;"><div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;">Anchor Lift Trends</div>${liftRowsHtml}</div>` : ''}

        <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;">Ask Your Coach</div>

// ─── PR DETECTION ON SAVE ─────────────────────────────────────
function checkForPRs(variant, sessionLogs) {
  const newPRs = [];
  if (variant.tag !== 'heavy') return newPRs; // Only check PRs on heavy days
  if (isDeloadWeek) return newPRs; // No PRs on deload week
  variant.sections.forEach(section => {
    section.exercises.forEach(ex => {
      const exList = ex.superset ? ex.exercises : [ex];
      exList.forEach(e => {
        if (!e.anchor) return;
        const log = sessionLogs[e.id];
        if (!log || !log.sets) return;
        // Find best estimated 1RM from today's session
        let bestEst = 0;
        let bestSet = null;
        log.sets.forEach(s => {
          const w = parseFloat(s.weight);
          const r = parseInt(s.reps);
          if (isNaN(w) || isNaN(r) || w <= 0 || r <= 0) return;
          const est = epley1RM(w, r);
          if (est > bestEst) { bestEst = est; bestSet = { weight: w, reps: r }; }
        });
        if (!bestSet) return;
        const pr = getLifePR(e.id);
        const prEst = pr ? pr.estimated1RM : 0;
        if (bestEst > prEst) {
          newPRs.push({ name: e.name, weight: bestSet.weight, reps: bestSet.reps, estimated1RM: Math.round(bestEst), id: e.id });
        }
      });
    });
  });
  return newPRs;
}

// ─── PICK EXISTING EXERCISE ────────────────────────────────────

// Scans localStorage for every distinct exercise name the person has ever
// logged, so "+ Add Exercise" can offer a pick-list instead of always
// starting blank. Pulls from hist_* keys (session-level, which store the
// display name directly) plus any custom name_* overrides.
// Collapses names that only differ by casing, punctuation, or extra spaces
// into a single canonical key, so "Cable Fly (High to Low)" and "Cable Fly
// High to Low" are treated as the same exercise instead of showing twice.
function normalizeExerciseName(name) {
  return name
    .toLowerCase()
    .replace(/[().,]/g, '')      // strip parentheses, commas, periods
    .replace(/\s+/g, ' ')        // collapse multiple spaces
    .trim();
}

function getAllLoggedExerciseNames() {
  // Map of normalized-key -> the "best" original-cased name to actually show.
  // When duplicates collide, prefer the longer name (usually the more
  // descriptive one, e.g. keeps "(High to Low)" over a bare version).
  const byNormalized = {};

  const consider = (name) => {
    if (!name || name.startsWith('dl-') || name.startsWith('burn-')) return;
    const key = normalizeExerciseName(name);
    if (!byNormalized[key] || name.length > byNormalized[key].length) {
      byNormalized[key] = name;
    }
  };

  Object.keys(localStorage).forEach(key => {
    if (!key.startsWith('hist_session_')) return;
    try {
      const sessions = JSON.parse(localStorage.getItem(key));
      sessions.forEach(session => {
        (session.exercises || []).forEach(ex => consider(ex.name));
      });
    } catch(e) {}
  });

  Object.keys(localStorage).forEach(key => {
    if (!key.startsWith('name_')) return;
    consider(localStorage.getItem(key));
  });

  // If an exercise ID has been renamed, its ORIGINAL (pre-rename) name should
  // no longer appear in the picker at all — only the current rename. This
  // prevents the confusing case where an old label (e.g. "Bulgarian Split
  // Squat (Smith)") still shows in the list but actually resolves to a
  // completely different, renamed exercise (e.g. "Elevated Close Squat"),
  // since one exercise ID can only ever have one true current name.
  const nameToId = buildExerciseNameToIdMap();
  const renamedOriginalKeys = new Set();
  Object.keys(localStorage).forEach(key => {
    if (!key.startsWith('name_')) return;
    const originalId = key.replace('name_', '');
    // Find the ORIGINAL program name for this id (before the rename) so we
    // can suppress it from the picker list.
    Object.entries(nameToId).forEach(([normalizedName, id]) => {
      if (id === originalId) {
        const currentName = localStorage.getItem(key);
        if (normalizeExerciseName(currentName) !== normalizedName) {
          renamedOriginalKeys.add(normalizedName);
        }
      }
    });
  });
  renamedOriginalKeys.forEach(key => delete byNormalized[key]);

  return Object.values(byNormalized).sort((a, b) => a.localeCompare(b));
}

// Builds a name -> exercise-id lookup table from every known exercise
// definition in the app: the full weekly PROGRAM, the accessory pools used
// by the randomizer, deload extras, and the burn finisher. This is what lets
// the exercise picker attach REAL history to a picked exercise instead of
// creating a fresh, historyless custom entry with the same display name.
function buildExerciseNameToIdMap() {
  const map = {};

  // 1. Every exercise across the full weekly program (all variants, all days)
  PROGRAM.forEach(day => {
    if (day.rest) return;
    ['weekA', 'weekB'].forEach(wk => {
      const variant = day[wk];
      if (!variant || !variant.sections) return;
      variant.sections.forEach(section => {
        section.exercises.forEach(ex => {
          const list = ex.superset ? ex.exercises : [ex];
          list.forEach(e => { if (e.name && e.id) map[normalizeExerciseName(e.name)] = e.id; });
        });
      });
    });
  });

  // 2. Accessory randomizer pools
  if (typeof ACCESSORY_POOLS !== 'undefined') {
    Object.values(ACCESSORY_POOLS).forEach(pool => {
      pool.forEach(ex => { if (ex.name && ex.id) map[normalizeExerciseName(ex.name)] = ex.id; });
    });
  }

  // 3. Deload extras (current 5-day split: mon-legs, tue-push, wed-pull, fri-legs, sat-upper)
  if (typeof getDeloadExtras === 'function') {
    ['mon-legs', 'tue-push', 'wed-pull', 'fri-legs', 'sat-upper'].forEach(base => {
      getDeloadExtras(base).forEach(ex => { if (ex.name && ex.id) map[normalizeExerciseName(ex.name)] = ex.id; });
    });
  }

  // 4. Burn finishers
  if (typeof getBurnFinisher === 'function') {
    ['mon-legs', 'tue-push', 'wed-pull', 'fri-legs', 'sat-upper'].forEach(base => {
      const bf = getBurnFinisher(base);
      if (bf && bf.name && bf.id) map[normalizeExerciseName(bf.name)] = bf.id;
    });
  }

  // 5. Custom name overrides (renamed presets) — map the CURRENT display name
  // back to the underlying preset id it was renamed from.
  Object.keys(localStorage).forEach(key => {
    if (!key.startsWith('name_')) return;
    const originalId = key.replace('name_', '');
    const displayName = localStorage.getItem(key);
    if (displayName) map[normalizeExerciseName(displayName)] = originalId;
  });

  return map;
}

// normal accessory — usable on ANY day, not just the automatic volume-day slot.

}

function pickBurnFinisherExercise(listId, dayIndex, btn) {
  const name = btn.textContent;
  closeExercisePicker();

  const nameToId = buildExerciseNameToIdMap();
  const knownId = nameToId[normalizeExerciseName(name)];
  const variant = getCurrentVariant(dayIndex);
  const isVol = variant && variant.tag === 'volume';

  // Use "burn-manual-" prefix so getSuggestion's burn-finisher branch picks
  // it up (it checks exId.startsWith('burn-')), and relatedId points at the
  // real underlying exercise so the 65% calculation has real history to draw from.
  const burnId = 'burn-manual-' + (knownId || normalizeExerciseName(name).replace(/\s+/g, '-'));
  const exDef = {
    id: burnId,
    name: name + ' (Burn Set)',
    forceName: name + ' (Burn Set)',
    note: '🔥 Manual burn finisher — 60-70% of normal working weight, 15-20 reps. Push through the burn.',
    target: '2 × 15–20',
    defaultSets: 2,
    relatedId: knownId || undefined,
  };

  const listEl = document.getElementById(listId);
  if (listEl) {
    listEl.insertAdjacentHTML('beforeend', renderExercise(exDef, isVol));
    showToast('🔥 Burn finisher added!');
  }
}

function filterPickerOptions(query) {
  const q = query.trim().toLowerCase();
  const options = document.querySelectorAll('.picker-option');
  options.forEach(btn => {
    const match = btn.textContent.toLowerCase().includes(q);
    btn.style.display = match ? 'block' : 'none';
  });
}

function closeExercisePicker() {
  const overlay = document.getElementById('exercise-picker-overlay');
  if (overlay) overlay.remove();
}

function pickExistingExercise(listId, dayIndex, btn) {
  const name = btn.textContent;
  closeExercisePicker();

  // Check if this exercise name maps to a known exercise ID with real history.
  // If so, render it as a REAL exercise card (same path as preset exercises)
  // so it gets an actual weight suggestion instead of starting blank.
  const nameToId = buildExerciseNameToIdMap();
  const knownId = nameToId[normalizeExerciseName(name)];

  if (knownId) {
    const variant = getCurrentVariant(dayIndex);
    const isVol = variant && variant.tag === 'volume';
    const exDef = { id: knownId, name: name, forceName: name, note: 'Added from your logged history.', target: '', defaultSets: 3 };
    const listEl = document.getElementById(listId);
    if (listEl) {
      listEl.insertAdjacentHTML('beforeend', renderExercise(exDef, isVol));
      showToast('Added with your history!');
      return;
    }
  }

  // Fallback: no known ID for this name, add as a plain custom exercise
  if (!sessionLogs._custom) sessionLogs._custom = [];
  const idx = sessionLogs._custom.length;
  sessionLogs._custom.push({ name: name, sets: [{ weight: '', reps: '' }] });
  appendCustomExerciseCard(dayIndex, idx, name, [], listId);
}

function addBrandNewExercise(listId, dayIndex) {
  const searchEl = document.getElementById('pickerSearch');
  const typedName = searchEl ? searchEl.value.trim() : '';
  closeExercisePicker();
  if (!sessionLogs._custom) sessionLogs._custom = [];
  const idx = sessionLogs._custom.length;
  const name = typedName || 'Exercise Name';
  sessionLogs._custom.push({ name: name, sets: [{ weight: '', reps: '' }] });
  appendCustomExerciseCard(dayIndex, idx, name, [], listId);
}

function getMuscleGroup(variantId) {
  if (variantId.includes('push')) return 'push';
  if (variantId.includes('pull')) return 'pull';
  if (variantId.includes('legs')) return 'legs';
  if (variantId.includes('upper')) return 'upper';
  return null;
}

// Target slot counts per muscle group, based on Bryce's actual logged accessory
// patterns (averaged across real sessions) — NOT an even 1-per-muscle split.
// Push: chest-heavy + tricep-heavy. Pull: bicep-heavy. Legs: ab-heavy.
const MUSCLE_SLOT_COUNTS = {
  push:  { chest: 2, delts: 2, triceps: 3 },
  // Pull base: 2 back, 2 biceps, 1 rear delt, 1 trap. Forearms starts at 0 —
  // it only shows up when the volume-gap logic detects it's been neglected
  // relative to the rest of the pool and bumps it to 1 for that session.
  pull:  { lats: 2, rear_delt: 1, biceps: 2, traps: 1, forearms: 0 },
  legs:  { quads: 1, hamstrings: 1, glutes: 1, calves: 1, abs: 2 },
  // Upper (Saturday) blends push and pull accessory work regardless of
  // whether that week is Row Focused or Chest Focused — the fixed anchors
  // already carry the primary emphasis, so accessories stay balanced across
  // both push and pull muscle groups rather than needing a separate pool.
  upper: { chest: 1, delts: 1, triceps: 1, lats: 1, rear_delt: 1, biceps: 1 },
};


// ─── SMART RANDOMIZER: sentiment + volume-gap analysis ─────────

const POSITIVE_WORDS = ['great', 'amazing', 'love', 'loved', 'awesome', 'wow', 'insane',
  'perfect', 'best', 'fantastic', 'incredible', 'crushed', 'good', 'nice', 'strong'];

// Scans all session-level history for notes mentioning an exercise (or superset
// pairing) alongside positive language, and returns a score per exercise name +
// per superset pairing (as a "nameA + nameB" key). Higher score = mentioned
// positively more often, which nudges the randomizer to favor it.
function getSentimentScores() {
  const exerciseScores = {};   // exercise name -> count of positive mentions
  const pairScores = {};       // "nameA|||nameB" (sorted) -> count of positive mentions

  Object.keys(localStorage).forEach(key => {
    if (!key.startsWith('hist_session_')) return;
    let sessions;
    try { sessions = JSON.parse(localStorage.getItem(key)); } catch(e) { return; }
    if (!Array.isArray(sessions)) return;

    sessions.forEach(session => {
      const sessionNoteLower = (session.notes || '').toLowerCase();
      const sessionIsPositive = POSITIVE_WORDS.some(w => sessionNoteLower.includes(w));

      // Track which exercises appear in this session, grouped by supersetGroup
      const groupMembers = {};
      (session.exercises || []).forEach(ex => {
        if (ex.supersetGroup) {
          if (!groupMembers[ex.supersetGroup]) groupMembers[ex.supersetGroup] = [];
          groupMembers[ex.supersetGroup].push(ex.name);
        }

        // Check per-set notes AND the exercise appearing in a positive overall session
        const setNotes = (ex.sets || []).map(s => (s.note || '').toLowerCase()).join(' ');
        const exercisePositive = POSITIVE_WORDS.some(w => setNotes.includes(w));

        if (exercisePositive) {
          exerciseScores[ex.name] = (exerciseScores[ex.name] || 0) + 2; // direct mention weighted higher
        } else if (sessionIsPositive) {
          exerciseScores[ex.name] = (exerciseScores[ex.name] || 0) + 0.5; // weak signal from overall session vibe
        }
      });

      // Score superset pairs that appeared in a positively-noted session
      Object.values(groupMembers).forEach(names => {
        if (names.length < 2) return;
        const key = [...names].sort().join('|||');
        if (sessionIsPositive) {
          pairScores[key] = (pairScores[key] || 0) + 1;
        }
      });
    });
  });

  return { exerciseScores, pairScores };
}

// Looks at the last 4 weeks of session history for a muscle group and counts
// how many times each muscle sub-group (chest, delts, triceps, etc.) actually
// got trained, so slot counts can rebalance toward whatever's been neglected.
function getRecentMuscleVolume(muscleGroup, allExercisesInPool) {
  const fourWeeksAgo = new Date();
  fourWeeksAgo.setDate(fourWeeksAgo.getDate() - 28);
  const cutoff = fourWeeksAgo.toISOString().split('T')[0];

  // Build a name -> muscle lookup from the pool
  const nameToMuscle = {};
  allExercisesInPool.forEach(ex => { nameToMuscle[ex.name] = ex.muscle; });

  const muscleCounts = {};
  const heavyKey = 'hist_session_' + muscleGroup + '-heavy';
  const volKey = 'hist_session_' + muscleGroup + '-volume';
  [heavyKey, volKey].forEach(key => {
    let sessions;
    try { sessions = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { sessions = []; }
    sessions.forEach(session => {
      if (session.date < cutoff) return;
      (session.exercises || []).forEach(ex => {
        const muscle = nameToMuscle[ex.name];
        if (muscle) muscleCounts[muscle] = (muscleCounts[muscle] || 0) + 1;
      });
    });
  });
  return muscleCounts;
}

// Weighted random pick from an array, using a score map (higher score = more
// likely to be picked, but never impossible for a low-score item to appear).
function weightedPick(items, scoreFn) {
  const weights = items.map(item => 1 + Math.max(0, scoreFn(item))); // base weight 1, boosted by score
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    r -= weights[i];
    if (r <= 0) return items[i];
  }
  return items[items.length - 1];
}


// ─── LAST-SESSION ACCESSORY PRESET ──────────────────────────────

// Captures the CURRENT live DOM state of the Accessories section (whatever
// combination of preset/custom/randomized exercises is on screen right now)
// and stores it keyed by day variant, so the next time this exact day type
// comes around (e.g. heavy push Week A), it defaults to what you actually
// did last time instead of the static program list. Includes superset
// pairing info so favorite combos replay correctly too.
function captureAccessoriesSnapshot(variant, dayIndex) {
  const accessoriesSection = document.getElementById('section-accessories-' + dayIndex);
  if (!accessoriesSection) return;

  const snapshot = [];
  let groupCounter = 0;

  const walkCard = (card, groupId) => {
    if (card.classList.contains('exercise-card')) {
      const exId = card.dataset.exid;
      // Find the exercise definition to capture its note/target/defaultSets
      let exDef = null;
      ACCESSORY_POOLS && Object.values(ACCESSORY_POOLS).forEach(pool => {
        pool.forEach(ex => { if (ex.id === exId) exDef = ex; });
      });
      // Also check the static program in case it's a normal (non-randomized) accessory
      if (!exDef) {
        variant.sections.forEach(section => {
          section.exercises.forEach(ex => {
            const list = ex.superset ? ex.exercises : [ex];
            list.forEach(e => { if (e.id === exId) exDef = e; });
          });
        });
      }
      if (exDef) snapshot.push({ ...exDef, supersetGroup: groupId });
    } else if (card.classList.contains('custom-exercise-card')) {
      const idx = card.id ? parseInt(card.id.replace('custom-ex-', '')) : null;
      const customEx = (idx !== null && sessionLogs._custom) ? sessionLogs._custom[idx] : null;
      if (customEx && customEx.name) {
        snapshot.push({
          id: 'custom-' + (customEx.name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-'),
          name: customEx.name, note: '', target: '', defaultSets: 3,
          isCustomSnapshot: true, supersetGroup: groupId
        });
      }
    }
  };

  [...accessoriesSection.children].forEach(child => {
    if (child.classList.contains('superset-block')) {
      const groupId = 'ss-snap-' + (groupCounter++);
      child.querySelectorAll('.exercise-card, .custom-exercise-card').forEach(card => walkCard(card, groupId));
    } else if (child.classList.contains('exercise-card') || child.classList.contains('custom-exercise-card')) {
      walkCard(child, null);
    }
  });

  if (snapshot.length) {
    localStorage.setItem('accessory_snapshot_' + variant.id, JSON.stringify(snapshot));
  }
}

// Retrieves the last-saved accessory snapshot for this exact day variant, if
// one exists. Returns null if nothing has ever been logged for this variant
// yet, so the static program default is used instead.
function getAccessoriesSnapshot(variantId) {
  const raw = localStorage.getItem('accessory_snapshot_' + variantId);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch(e) { return null; }
}

function randomizeAccessories() {
  const variant = getCurrentVariant(currentDay);
  if (!variant) return;
  const muscleGroup = getMuscleGroup(variant.id);
  if (!muscleGroup) return;

  const pool = ACCESSORY_POOLS[muscleGroup];
  const baseSlotCounts = MUSCLE_SLOT_COUNTS[muscleGroup];
  if (!pool || !baseSlotCounts) return;

  // ── Volume-gap analysis: look at the last 4 weeks of real sessions for this
  // muscle group and see which sub-muscles have been UNDER their base target.
  // If a muscle has been getting less than its fair share, bump its slot count
  // up by 1 (capped) so the randomizer naturally corrects the imbalance.
  const recentVolume = getRecentMuscleVolume(muscleGroup, pool);
  const totalRecentSessions = Object.values(recentVolume).reduce((a,b) => a+b, 0);
  const slotCounts = {};
  Object.entries(baseSlotCounts).forEach(([muscle, baseCount]) => {
    const actualCount = recentVolume[muscle] || 0;

    if (baseCount === 0) {
      // Zero-base muscles (like forearms) are opt-in only: if there's enough
      // real training data overall AND this muscle has gotten zero direct
      // work in the last 4 weeks, introduce it for one slot this session.
      // Otherwise it stays fully absent, matching "only when data says so."
      slotCounts[muscle] = (totalRecentSessions >= 3 && actualCount === 0) ? 1 : 0;
      return;
    }

    // Expected count over 4 weeks (roughly 4-8 sessions of this muscle group type)
    const expectedShare = totalRecentSessions > 0
      ? (baseCount / Object.values(baseSlotCounts).reduce((a,b)=>a+b,0)) * totalRecentSessions
      : baseCount;
    const isUnderTrained = totalRecentSessions >= 3 && actualCount < expectedShare * 0.7;
    slotCounts[muscle] = isUnderTrained ? baseCount + 1 : baseCount;
  });

  // ── Sentiment analysis: pull scores for individual exercises and superset pairs
  const { exerciseScores, pairScores } = getSentimentScores();

  // Group pool by muscle tag
  const byMuscle = {};
  pool.forEach(ex => {
    if (!byMuscle[ex.muscle]) byMuscle[ex.muscle] = [];
    byMuscle[ex.muscle].push(ex);
  });

  // For each muscle group, weighted-pick N exercises (N = adjusted slot count),
  // favoring exercises with higher sentiment scores without ever fully excluding
  // the rest of the pool.
  const picked = [];
  Object.entries(slotCounts).forEach(([muscle, count]) => {
    const group = byMuscle[muscle] || [];
    if (!group.length) return;
    const usedThisRound = new Set();
    for (let i = 0; i < count; i++) {
      // Avoid picking the exact same exercise twice in the same muscle slot
      // unless the pool is smaller than the slot count.
      const available = group.filter(ex => !usedThisRound.has(ex.id));
      const pickFrom = available.length ? available : group;
      const chosen = weightedPick(pickFrom, ex => exerciseScores[ex.name] || 0);
      usedThisRound.add(chosen.id);
      picked.push(chosen);
    }
  });

  // Shuffle the final list order
  picked.sort(() => Math.random() - 0.5);

  // ── Recreate favorite superset pairings: if two picked exercises match a
  // pairing you've praised in notes before, tag them with a shared group ID
  // so they render as a superset instead of standalone.
  const supersetAssignments = {}; // exercise id -> group id
  let groupCounter = 0;
  for (let i = 0; i < picked.length; i++) {
    if (supersetAssignments[picked[i].id]) continue;
    for (let j = i + 1; j < picked.length; j++) {
      if (supersetAssignments[picked[j].id]) continue;
      const key = [picked[i].name, picked[j].name].sort().join('|||');
      if (pairScores[key] && pairScores[key] > 0) {
        const groupId = 'ss-fav-' + (groupCounter++);
        supersetAssignments[picked[i].id] = groupId;
        supersetAssignments[picked[j].id] = groupId;
        break;
      }
    }
  }

  // Find the Accessories section in the DOM and replace its exercise cards
  const accessoriesSection = document.getElementById('section-accessories-' + currentDay);
  if (!accessoriesSection) { showToast('No accessories section found'); return; }

  // Remove all existing exercise cards from accessories section
  const existingCards = [...accessoriesSection.querySelectorAll('.exercise-card, .custom-exercise-card, .superset-block')];
  existingCards.forEach(card => card.remove());

  // Render fresh cards — pairs flagged in supersetAssignments render together
  // inside a superset-block, matching the visual style used everywhere else.
  const isVol = variant.tag === 'volume';
  const rendered = new Set();
  let html = '';
  picked.forEach(ex => {
    if (rendered.has(ex.id)) return;
    const groupId = supersetAssignments[ex.id];
    if (groupId) {
      const partner = picked.find(p => p.id !== ex.id && supersetAssignments[p.id] === groupId && !rendered.has(p.id));
      if (partner) {
        html += `<div class="superset-block"><div class="superset-header">⚡ Superset — back to back (a favorite pairing)</div>`;
        html += renderExercise(ex, isVol);
        html += `<div class="superset-divider">↕ then immediately</div>`;
        html += renderExercise(partner, isVol);
        html += `</div>`;
        rendered.add(ex.id);
        rendered.add(partner.id);
        return;
      }
    }
    html += renderExercise(ex, isVol);
    rendered.add(ex.id);
  });
  accessoriesSection.insertAdjacentHTML('beforeend', html);

  const favoritePairCount = new Set(Object.values(supersetAssignments)).size;
  showToast(favoritePairCount > 0
    ? `Randomized — kept ${favoritePairCount} favorite pairing${favoritePairCount > 1 ? 's' : ''}!`
    : 'Accessories randomized!');
}

  chatCopyBtn.style.cssText = 'width:100%;margin-top:10px;padding:12px;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.4);border-radius:8px;color:#a78bfa;font-family:monospace;font-size:12px;font-weight:600;cursor:pointer;';
  chatCopyBtn.onclick = function() {
    chatTa.focus();
    chatTa.select();
    try {
      document.execCommand('copy');
      chatCopyBtn.textContent = '✓ Copied!';
      setTimeout(() => chatCopyBtn.textContent = '📋 Copy Chat Backup', 2000);
    } catch(e) {
      chatTa.setSelectionRange(0, chatTa.value.length);
    }
  };

  chatToggle.onclick = function() {
    const isOpen = chatBody.style.display !== 'none';
    chatBody.style.display = isOpen ? 'none' : 'block';
    document.getElementById('chat-backup-arrow').textContent = isOpen ? '▾' : '▴';
  };

  chatBody.appendChild(chatInstructions);
  chatBody.appendChild(chatTa);
  chatBody.appendChild(chatCopyBtn);
  chatDivider.appendChild(chatToggle);
  chatDivider.appendChild(chatBody);
  modal.appendChild(chatDivider);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  
  // Auto focus and select
  setTimeout(() => { ta.focus(); ta.select(); }, 200);
}


function toggleImport(btn) {
  const area = document.getElementById('import-area');
  if (area) {
    area.style.display = area.style.display === 'none' ? 'block' : 'none';
  }
}

async function importData() {
  const text = document.getElementById('import-text').value.trim();
  if (!text) { showToast('No data to import'); return; }

  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch(e) {
    showToast('Invalid data — check format');
    return;
  }

  // If this is a Coach Chat Backup export (not the main training export),
  // restore just the chat history and stop — different shape, handled
  // separately since it's a much simpler restore.
  if (parsed.coachChatHistory !== undefined) {
    localStorage.setItem('coach_chat_history', parsed.coachChatHistory);
    showToast('Coach chat history restored! Reload the page.');
    setTimeout(() => location.reload(), 1500);
    return;
  }

  if (!parsed.localStorage) { showToast('Invalid format'); return; }

  // Restore localStorage, migrating old hist_session_<day> keys to new hist_session_<muscle>-<tag> format
  const oldDayToMuscle = {
    'mon-legs': 'legs', 'thu-legs': 'legs',
    'tue-push': 'push', 'fri-push': 'push',
    'wed-pull': 'pull', 'sat-pull': 'pull'
  };

  const migratedSessions = {}; // muscle-tag -> combined array

  Object.entries(parsed.localStorage).forEach(([key, val]) => {
    const oldSessionMatch = key.match(/^hist_session_(mon-legs|thu-legs|tue-push|fri-push|wed-pull|sat-pull)$/);
    if (oldSessionMatch) {
      const oldDay = oldSessionMatch[1];
      const muscle = oldDayToMuscle[oldDay];
      let sessions;
      try { sessions = JSON.parse(val); } catch(e) { sessions = []; }
      // Determine heavy/volume tag per session using exercise rep averages as fallback
      sessions.forEach(session => {
        // Infer heavy/volume from week label if present, else from rep averages
        let tag = 'heavy';
        if (session.week && /VOLUME/i.test(session.week)) tag = 'volume';
        else if (session.week && /HEAVY/i.test(session.week)) tag = 'heavy';
        else {
          // Infer from average reps across all exercises
          let allReps = [];
          (session.exercises || []).forEach(ex => {
            (ex.sets || []).forEach(s => {
              const r = parseInt(s.reps);
              if (!isNaN(r)) allReps.push(r);
            });
          });
          const avgReps = allReps.length ? allReps.reduce((a,b)=>a+b,0)/allReps.length : 8;
          tag = avgReps <= 8 ? 'heavy' : 'volume';
        }
        const newKey = 'hist_session_' + muscle + '-' + tag;
        if (!migratedSessions[newKey]) migratedSessions[newKey] = [];
        migratedSessions[newKey].push(session);
      });
    } else {
      // Not an old session key - store as-is
      localStorage.setItem(key, val);
    }
  });

  // Merge migrated sessions with any existing data under new keys
  Object.entries(migratedSessions).forEach(([newKey, newSessions]) => {
    const existing = JSON.parse(localStorage.getItem(newKey) || '[]');
    const combined = [...existing, ...newSessions];
    // Dedupe by date+exercise count, keep most recent 8
    const seen = new Set();
    const deduped = combined.filter(s => {
      const sig = s.date + '_' + (s.exercises ? s.exercises.length : 0);
      if (seen.has(sig)) return false;
      seen.add(sig);
      return true;
    }).sort((a,b) => a.date > b.date ? 1 : -1).slice(-8);
    localStorage.setItem(newKey, JSON.stringify(deduped));
  });

  // Restore persistent storage
  if (parsed.persistKeys) {
    for (const key of parsed.persistKeys) {
      const val = parsed.localStorage['log_' + key.replace('log_', '')];
      if (val) {
        try { await window.storage.set(key, val); } catch(e) {}
      }
    }
  }

  showToast('Data restored! Reload the page.');
  setTimeout(() => location.reload(), 1500);
}


function getMuscleGroupFromId(variantId) {
  if (variantId.includes('legs')) return 'legs';
  if (variantId.includes('push')) return 'push';
  if (variantId.includes('pull')) return 'pull';
  return variantId.replace(/-[ab]$/, '');
}

function getHistKey(variant) {
  const muscleGroup = getMuscleGroupFromId(variant.id);
  return 'hist_session_' + muscleGroup + '-' + variant.tag;
}

// Combined heavy + volume session history for a muscle group, for DISPLAY only.
// Saving still files sessions under their specific heavy/volume key (getHistKey).
function getMuscleGroupHistory(variant) {
  const muscleGroup = getMuscleGroupFromId(variant.id);
  const heavyKey = 'hist_session_' + muscleGroup + '-heavy';
  const volumeKey = 'hist_session_' + muscleGroup + '-volume';
  const heavySessions = JSON.parse(localStorage.getItem(heavyKey) || '[]');
  const volumeSessions = JSON.parse(localStorage.getItem(volumeKey) || '[]');
  const tagged = [
    ...heavySessions.map((s, i) => ({ ...s, _srcKey: heavyKey, _srcIdx: i })),
    ...volumeSessions.map((s, i) => ({ ...s, _srcKey: volumeKey, _srcIdx: i })),
  ];
  return tagged.sort((a, b) => a.date > b.date ? 1 : -1);
}


// ─── MOVE CARDS UP/DOWN ───────────────────────────────────────
function toggleSetNote(btn, exId, setIdx) {
  const areaId = `set-note-area-${exId}-${setIdx}`;
  const area = document.getElementById(areaId);
  if (!area) return;
  const isOpen = area.classList.contains('open');
  area.classList.toggle('open', !isOpen);
  if (!isOpen) {
    const ta = area.querySelector('textarea');
    if (ta) setTimeout(() => ta.focus(), 50);
  }
}

function updateSetNote(exId, setIdx, value) {
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  while (sessionLogs[exId].sets.length <= setIdx) sessionLogs[exId].sets.push({ weight:'', reps:'' });
  sessionLogs[exId].sets[setIdx].note = value;
  // Update toggle button color
  const btn = document.querySelector(`button.set-notes-toggle[onclick*="${exId}"][onclick*="${setIdx}"]`);
  if (btn) btn.classList.toggle('has-note', value.trim().length > 0);
}


function toggleAnchor(btn) {
  const card = btn.closest('.exercise-card, .custom-exercise-card');
  if (!card) return;
  const isAnchor = card.dataset.anchor === '1';
  if (isAnchor) {
    // Remove anchor
    card.dataset.anchor = '0';
    card.classList.remove('anchor', 'anchor-vol');
    btn.style.background = 'var(--card2)';
    btn.style.borderColor = 'var(--border)';
    btn.style.color = 'var(--muted)';
    btn.title = 'Promote to anchor';
  } else {
    // Promote to anchor - move to top of parent section and add anchor styling
    card.dataset.anchor = '1';
    card.classList.add('anchor');
    btn.style.background = 'var(--accent-dim)';
    btn.style.borderColor = 'rgba(200,241,53,.4)';
    btn.style.color = 'var(--accent)';
    btn.title = 'Remove anchor';
    // Move to top of its parent container
    const parent = card.parentNode;
    parent.insertBefore(card, parent.firstChild);
  }
}


function getMovableSiblings(container) {
  return [...container.children].filter(el =>
    el.classList.contains('exercise-card') ||
    el.classList.contains('custom-exercise-card') ||
    el.classList.contains('superset-block')
  );
}

function moveCard(btn, direction) {
  let card = btn.closest('.exercise-card, .custom-exercise-card');
  if (!card) return;

  const supersetParent = card.closest('.superset-block');
  if (supersetParent) {
    card = supersetParent;
  }

  const parent = card.parentNode;
  if (!parent) return;

  const siblings = getMovableSiblings(parent);
  const idx = siblings.indexOf(card);
  if (idx === -1) return;

  // Normal move within the same section
  if (direction === -1 && idx > 0) {
    parent.insertBefore(card, siblings[idx - 1]);
    return;
  }
  if (direction === 1 && idx < siblings.length - 1) {
    const nextSibling = siblings[idx + 1];
    parent.insertBefore(card, nextSibling.nextSibling);
    return;
  }

  // At the edge of this section — cross into the adjacent section if one exists.
  // parent here is a .section div (or the add-exercise area); find its sibling section.
  const currentSection = parent.closest('.section') || parent;
  if (!currentSection.classList.contains('section')) return;

  if (direction === -1) {
    // Moving up past the top of this section: find the previous .section,
    // drop the card at the END of it (just before that section closes).
    let prevSection = currentSection.previousElementSibling;
    while (prevSection && !prevSection.classList.contains('section')) {
      prevSection = prevSection.previousElementSibling;
    }
    if (!prevSection) return; // already at the very first section
    prevSection.appendChild(card);
  } else {
    // Moving down past the bottom of this section: find the next .section,
    // drop the card at the START of it (right after the section-label).
    let nextSection = currentSection.nextElementSibling;
    while (nextSection && !nextSection.classList.contains('section')) {
      nextSection = nextSection.nextElementSibling;
    }
    if (!nextSection) return; // already at the very last section
    const label = nextSection.querySelector('.section-label');
    if (label && label.nextSibling) {
      nextSection.insertBefore(card, label.nextSibling);
    } else {
      nextSection.appendChild(card);
    }
  }
}


// ─── CUSTOM SUPERSET ─────────────────────────────────────────
function addCustomSuperset(listId, dayIndex) {
  if (!sessionLogs._custom) sessionLogs._custom = [];
  const idx = sessionLogs._custom.length;
  sessionLogs._custom.push({ name: 'Exercise A', sets: [{ weight: '', reps: '' }], supersetPair: idx + 1 });
  sessionLogs._custom.push({ name: 'Exercise B', sets: [{ weight: '', reps: '' }], supersetPair: idx });
  appendCustomSupersetCard(dayIndex, idx, idx + 1, '', '', [], [], listId);
}

function appendCustomSupersetCard(dayIndex, idxA, idxB, nameA, nameB, setsA, setsB, listId) {
  const list = document.getElementById(listId || ('custom-list-' + dayIndex));
  if (!list) return;

  const wrapper = document.createElement('div');
  wrapper.className = 'superset-block';
  wrapper.id = 'custom-superset-' + idxA;

  const makeSets = (sets, idx) => (sets && sets.length ? sets : [{ weight: '', reps: '' }]).map((s, si) => `
    <div class="set-entry">
      <span class="set-num">S${si+1}</span>
      <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
        value="${s.weight||''}" onchange="updateCustomSet(${idx},${si},'weight',this.value)"/>
      <span style="color:var(--muted);font-size:12px">×</span>
      <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
        value="${s.reps||''}" onchange="updateCustomSet(${idx},${si},'reps',this.value)"/>
    </div>`).join('');

  wrapper.innerHTML = `
    <div class="superset-header">⚡ Superset — back to back
      <button onclick="removeCustomSuperset(${idxA}, ${idxB})" style="float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;">✕</button>
    </div>
    <div class="custom-exercise-card" style="margin-bottom:3px;border-radius:7px;">
      <div class="custom-exercise-header">
        <input class="custom-exercise-input" type="text" placeholder="Exercise A"
          value="${nameA}" oninput="updateCustomName(${idxA}, this.value)" />
      </div>
      <div class="log-area">
        <div id="custom-sets-${idxA}">${makeSets(setsA, idxA)}</div>
        <button class="add-set-btn" onclick="addCustomSet(${idxA})">+ Add Set</button>
      </div>
    </div>
    <div class="superset-divider">↕ then immediately</div>
    <div class="custom-exercise-card" style="border-radius:7px;">
      <div class="custom-exercise-header">
        <input class="custom-exercise-input" type="text" placeholder="Exercise B"
          value="${nameB}" oninput="updateCustomName(${idxB}, this.value)" />
      </div>
      <div class="log-area">
        <div id="custom-sets-${idxB}">${makeSets(setsB, idxB)}</div>
        <button class="add-set-btn" onclick="addCustomSet(${idxB})">+ Add Set</button>
      </div>
    </div>`;
  list.appendChild(wrapper);
}

function removeCustomSuperset(idxA, idxB) {
  const wrapper = document.getElementById('custom-superset-' + idxA);
  if (wrapper) wrapper.remove();
  if (sessionLogs._custom) {
    if (sessionLogs._custom[idxA]) sessionLogs._custom[idxA] = null;
    if (sessionLogs._custom[idxB]) sessionLogs._custom[idxB] = null;
  }
}

// ─── PAIR EXISTING EXERCISES ──────────────────────────────────
let pairMode = false;
let pairDayIndex = null;
let pairSelectedCard = null;

function startPairMode(dayIndex) {
  pairMode = true;
  pairDayIndex = dayIndex;
  pairSelectedCard = null;

  const banner = document.getElementById('superset-mode-banner-' + dayIndex);
  banner.innerHTML = `<div class="superset-mode-banner">
    <span>Tap two exercises to superset them</span>
    <button class="superset-mode-cancel" onclick="cancelPairMode(${dayIndex})">✕ Cancel</button>
  </div>`;

  // Add pick styling to all exercise cards AND custom exercise cards
  document.querySelectorAll('.exercise-card, .custom-exercise-card').forEach(card => {
    card.classList.add('superset-pick-target');
    card.addEventListener('click', handlePairClick);
  });
}

function cancelPairMode(dayIndex) {
  pairMode = false;
  pairSelectedCard = null;
  const banner = document.getElementById('superset-mode-banner-' + dayIndex);
  if (banner) banner.innerHTML = '';
  document.querySelectorAll('.exercise-card, .custom-exercise-card').forEach(card => {
    card.classList.remove('superset-pick-target', 'superset-selected');
    card.removeEventListener('click', handlePairClick);
  });
}

function handlePairClick(e) {
  if (!pairMode) return;
  const card = e.currentTarget;

  if (!pairSelectedCard) {
    // First selection
    pairSelectedCard = card;
    card.classList.add('superset-selected');
  } else if (pairSelectedCard === card) {
    // Deselect
    pairSelectedCard = null;
    card.classList.remove('superset-selected');
  } else {
    // Second selection — wrap both in a superset block
    const cardA = pairSelectedCard;
    const cardB = card;

    const wrapper = document.createElement('div');
    wrapper.className = 'superset-block';
    wrapper.style.marginBottom = '6px';

    const header = document.createElement('div');
    header.className = 'superset-header';
    header.innerHTML = '⚡ Superset — back to back <button onclick="unpairSuperset(this)" style="float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;">✕</button>';

    const divider = document.createElement('div');
    divider.className = 'superset-divider';
    divider.textContent = '↕ then immediately';

    cardA.classList.remove('superset-pick-target', 'superset-selected');
    cardB.classList.remove('superset-pick-target', 'superset-selected');
    cardA.style.borderRadius = '7px';
    cardB.style.borderRadius = '7px';
    cardA.style.marginBottom = '3px';

    const parentA = cardA.parentNode;
    const parentB = cardB.parentNode;
    // Remove cardB from its current location first
    if (parentB && parentB !== parentA) parentB.removeChild(cardB);
    // Insert wrapper where cardA is
    parentA.insertBefore(wrapper, cardA);
    wrapper.appendChild(header);
    wrapper.appendChild(cardA);
    wrapper.appendChild(divider);
    wrapper.appendChild(cardB);

    cancelPairMode(pairDayIndex);
  }
}

function unpairSuperset(btn) {
  const wrapper = btn.closest('.superset-block');
  if (!wrapper) return;
  const parent = wrapper.parentNode;
  const cards = wrapper.querySelectorAll('.exercise-card');
  cards.forEach(card => {
    card.style.borderRadius = '';
    card.style.marginBottom = '';
    parent.insertBefore(card, wrapper);
  });
  wrapper.remove();
}

function getFeel(val) {
  val = parseInt(val);
  if (val <= 2) return '😵';
  if (val <= 4) return '😞';
  if (val <= 6) return '😐';
  if (val <= 8) return '💪';
  return '🔥';
}

function updateFeel(val) {
  sessionLogs._feel = parseInt(val);
  const valEl = document.getElementById('feelValue');
  const emojiEl = document.getElementById('feelEmoji');
  if (valEl) valEl.textContent = val;
  if (emojiEl) emojiEl.textContent = getFeel(val);
  // Color the value based on rating
  if (valEl) {
    valEl.style.color = val <= 4 ? '#ff6b6b' : val <= 6 ? 'var(--muted)' : 'var(--accent)';
  }
}


function deleteExerciseCard(btn) {
  const card = btn.closest('.exercise-card');
  if (!card) return;
  const exId = card.dataset.exid;
  if (exId && sessionLogs[exId]) delete sessionLogs[exId];
  card.remove();
}


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

<script>
// Force fresh load on every visit — no stale cache
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(registrations => {
    registrations.forEach(reg => reg.unregister());
  });
}
// Hard reload if cached version detected
window.addEventListener('load', () => {
  if (window.performance && window.performance.navigation.type === window.performance.navigation.TYPE_BACK_FORWARD) {
    window.location.reload(true);
  }
});
</script>
