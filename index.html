<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bryce's Program">
<meta name="theme-color" content="#0d0d0d">
<title>Bryce's Program</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --black:#0d0d0d;--dark:#151515;--card:#1c1c1c;--card2:#222;--border:#2a2a2a;
    --accent:#c8f135;--accent-dim:rgba(200,241,53,0.12);
    --blue:#64b4ff;--blue-dim:rgba(100,180,255,0.08);
    --orange:#ff9f43;--orange-dim:rgba(255,159,67,0.1);
    --green:#4ade80;--white:#f0f0f0;--muted:#6b6b6b;--input-bg:#252525;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:100px;}
  header{background:var(--dark);border-bottom:1px solid var(--border);padding:48px 20px 0;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  .program-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.03em;line-height:1;}
  h1 span{color:var(--accent);}
  .week-indicator{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .week-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;letter-spacing:.08em;}
  .week-badge.week-a{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(200,241,53,.4);}
  .week-badge.week-b{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,159,67,.4);}
  .week-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;}
  .day-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin:0 -20px;padding:0 20px;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:all .2s;}
  .tab:hover{color:var(--white);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:5px;vertical-align:middle;opacity:0;}
  .tab-dot.has-log{opacity:1;}
  main{padding:20px;max-width:640px;margin:0 auto;}
  .day-content{display:none;}
  .day-content.active{display:block;}
  .day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
  .day-number{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.2em;margin-bottom:3px;}
  .day-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;line-height:1;}
  .day-subtitle{font-size:12px;color:var(--muted);margin-top:3px;font-weight:300;}
  .tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;padding:3px 8px;border-radius:4px;text-transform:uppercase;margin-top:4px;display:inline-block;}
  .tag-heavy{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(200,241,53,.3);}
  .tag-volume{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,159,67,.3);}
  .session-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .session-date-input{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 12px;flex:1;outline:none;}
  .session-date-input:focus{border-color:var(--accent);}
  .section{margin-bottom:24px;}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);}
  .exercise-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;}
  .exercise-card.anchor{border-left:3px solid var(--accent);}
  .exercise-card.anchor-vol{border-left:3px solid var(--orange);}
  .exercise-header{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .exercise-name{font-weight:600;font-size:13px;line-height:1.3;}
  .exercise-note{font-size:11px;color:var(--muted);font-weight:300;line-height:1.4;margin-top:2px;}
  .exercise-target{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);white-space:nowrap;flex-shrink:0;text-align:right;}
  .exercise-target.vol-target{color:var(--orange);}
  .exercise-target .target-label{font-size:9px;color:var(--muted);display:block;margin-bottom:1px;}
  .log-area{background:var(--card2);border-top:1px solid var(--border);padding:10px 14px 12px;}
  .suggestion-box{background:rgba(100,180,255,0.08);border:1px solid rgba(100,180,255,0.2);border-radius:6px;padding:8px 12px;margin-bottom:10px;}
  .suggestion-box .sugg-title{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;}
  .suggestion-box .sugg-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--white);}
  .suggestion-box .sugg-last{font-size:11px;color:var(--muted);margin-top:2px;}
  .set-entry{display:flex;gap:6px;align-items:center;margin-bottom:4px;}
  .set-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:24px;flex-shrink:0;}
  .log-input{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:7px 10px;width:100%;outline:none;text-align:center;-webkit-appearance:none;}
  .log-input:focus{border-color:var(--accent);}
  .log-input::placeholder{color:var(--muted);font-weight:400;}
  .add-set-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:none;border:1px dashed rgba(200,241,53,.3);border-radius:6px;padding:5px 10px;cursor:pointer;width:100%;margin-top:4px;}
  .superset-block{border:1px solid rgba(100,180,255,.3);border-radius:10px;padding:4px;margin-bottom:6px;background:rgba(100,180,255,.03);}
  .superset-header{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);letter-spacing:.15em;text-transform:uppercase;padding:6px 10px 4px;}
  .superset-block .exercise-card{margin-bottom:3px;border-radius:7px;}
  .superset-block .exercise-card:last-child{margin-bottom:0;}
  .superset-divider{text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);padding:2px 0;}
  .rest-day{text-align:center;padding:80px 24px;}
  .rest-icon{font-size:44px;margin-bottom:16px;}
  .rest-title{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:.05em;color:var(--muted);margin-bottom:12px;}
  .rest-desc{font-size:13px;color:var(--muted);max-width:340px;margin:0 auto;line-height:1.7;font-weight:300;}
  .save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:200;}
  .btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn-accent{background:var(--accent);color:var(--black);font-weight:600;}
  .btn-ghost{background:var(--card);color:var(--muted);border:1px solid var(--border);}
  .save-bar .btn{flex:1;padding:12px;font-size:12px;}

  .history-section{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);}
  .history-section-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
  .history-toggle-btn{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);background:none;border:none;cursor:pointer;letter-spacing:.1em;}
  .history-entry{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;}
  .history-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .history-entry-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);}
  .history-entry-week{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;}
  .history-exercise{margin-bottom:6px;}
  .history-exercise-name{font-size:11px;font-weight:600;color:var(--white);margin-bottom:2px;}
  .history-sets{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
  .add-exercise-section{margin-top:16px;}
  .add-exercise-btn{width:100%;padding:12px;background:var(--card);border:1px dashed var(--accent);border-radius:10px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .custom-exercise-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-top:6px;overflow:hidden;}
  .custom-exercise-header{padding:10px 14px;display:flex;align-items:center;gap:8px;}
  .custom-exercise-input{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:13px;font-weight:600;padding:6px 10px;flex:1;outline:none;}
  .custom-exercise-input:focus{border-color:var(--accent);}
  .remove-exercise-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px;}


  .exercise-card { position: relative; }
  .move-btns {
    position: absolute;
    top: 8px; right: 32px;
    display: flex;
    flex-direction: row;
    gap: 3px;
    z-index: 10;
  }
  .move-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 10px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    padding: 0;
    transition: all 0.15s;
  }
  .move-btn:active { background: var(--accent); color: var(--black); border-color: var(--accent); }
  .exercise-card .exercise-header { padding-left: 14px; padding-right: 60px; }
  .exercise-card.anchor .exercise-header,
  .exercise-card.anchor-vol .exercise-header { padding-left: 14px; padding-right: 60px; }


  .delete-exercise-btn {
    position: absolute;
    top: 8px; right: 6px;
    width: 22px; height: 22px;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: all 0.2s;
    z-index: 10;
  }
  .delete-exercise-btn:active { color: #ff6b6b; background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.4); }


  .add-superset-btn {
    width:100%;padding:12px;background:var(--card);
    border:1px dashed rgba(100,180,255,0.4);border-radius:10px;
    color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;
  }
  .superset-mode-banner {
    background:rgba(100,180,255,0.08);border:1px solid rgba(100,180,255,0.3);
    border-radius:8px;padding:10px 14px;margin-bottom:10px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);
    display:flex;align-items:center;justify-content:space-between;
  }
  .superset-mode-cancel {
    background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0 4px;
  }
  .exercise-card.superset-pick-target {
    border: 1px dashed rgba(100,180,255,0.6) !important;
    cursor:pointer;
  }
  .exercise-card.superset-pick-target:hover {
    border-color: var(--blue) !important;
    background: rgba(100,180,255,0.05);
  }
  .exercise-card.superset-selected {
    border: 2px solid var(--blue) !important;
  }

  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--accent);color:var(--black);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:10px 20px;border-radius:20px;z-index:999;transition:transform .3s ease;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="toast" id="toast">Workout saved!</div>
<header>
  <div class="header-top">
    <div>
      <div class="program-label">Bryce — Training Log</div>
      <h1>MY <span>PROGRAM</span></h1>
    </div>
  </div>
  <div class="week-indicator">
    <span class="week-badge" id="weekBadge" onclick="toggleWeek()" style="cursor:pointer;user-select:none;"></span>
    <span class="week-label" id="weekLabel"></span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-left:4px;cursor:pointer;" onclick="toggleWeek()">↺ tap to flip</span>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</header>
<main id="mainContent"></main>
<div class="save-bar">
  <button class="btn btn-ghost" onclick="clearDay()">Clear</button>
  <button class="btn btn-accent" onclick="saveDay()">Save Workout</button>
</div>
<script>

// ─── WEEK DETECTION ───────────────────────────────────────────
// Week A = odd ISO week number (heavy Mon/Fri, volume Thu/Sat)
// Week B = even ISO week number (volume Mon/Fri, heavy Thu/Sat)
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

const today = new Date();
const isoWeek = getISOWeek(today);
let isWeekA = isoWeek % 2 === 1; // odd weeks = Week A (tappable to override)

// ─── PROGRAM DATA ─────────────────────────────────────────────
// Each day has weekA and weekB variants
const PROGRAM = [
  // MON — LEGS
  {
    label: 'MON · Legs',
    weekA: {
      id: 'mon-legs-a', title: 'LEGS', subtitle: 'Quad & Unilateral — Heavy', tag: 'heavy',
      sections: [
        { label: 'Anchors', exercises: [
          { id:'squat', name:'Barbell Squat', note:'Leads today — Week A heavy. 2 heavy top sets + 1 back-off. 2–3 sec descent. All in.', target:'2 top + 1 back-off', anchor:true, defaultSets:3 },
          { id:'smith-lunge', name:'Smith Machine Lunges', note:'2 top sets then 1 back-off at 85–90%. Front shin vertical, full range.', target:'2 top + 1 back-off / leg', anchor:true, defaultSets:3 },
        ]},
        { label: 'Accessories', exercises: [
          { id:'leg-ext-mon', name:'Leg Extension', note:'Heavy. Pause at top every rep.', target:'3 × 8–10', defaultSets:3 },
          { superset:true, exercises:[
            { id:'leg-press-mon', name:'Leg Press', note:'Standard foot placement. Push the weight.', target:'3 × 8–10', defaultSets:3 },
            { id:'calf-ext-mon', name:'Calf Extension', note:'Full stretch, don\'t bounce.', target:'3 × 15', defaultSets:3 },
          ]},
          { id:'prone-curl-mon', name:'Prone Leg Curl', note:'Slow eccentric. RDLs are Thursday.', target:'3 × 8–10', defaultSets:3 },
          { id:'hip-abd-mon', name:'Cable Hip Abduction', note:'Controlled — hip and knee stability.', target:'3 × 12 / side', defaultSets:3 },
        ]},
        { label: 'Abs', exercises: [
          { id:'hang-crunch', name:'Hanging Weighted Ab Crunch', note:'Ribs to hips. Add weight when reps get easy.', target:'3 × 10–12', defaultSets:3 },
          { id:'rope-crunch', name:'Cable Rope Crunch', note:'Heavy. Kneeling, pull from crown of head.', target:'3 × 10–12', defaultSets:3 },
          { id:'cable-rot', name:'Cable Rotation (Obliques)', note:'Rotate through torso, not just arms.', target:'3 × 10 / side', defaultSets:3 },
        ]},
      ]
    },
    weekB: {
      id: 'mon-legs-b', title: 'LEGS', subtitle: 'Glute & Hamstring — Volume', tag: 'volume',
      sections: [
        { label: 'Anchors', exercises: [
          { id:'rdl-mon', name:'Romanian Deadlift', note:'2 working sets + 1 back-off with pause reps. Feel every rep — hinge at hips, bar stays close.', target:'2 sets + 1 back-off', anchor:true, defaultSets:3, anchorVol:true },
          { id:'bulgarian-mon', name:'Bulgarian Split Squat (Smith)', note:'2 working sets + 1 back-off lighter. Full depth, rear foot elevated. Feel the burn.', target:'2 sets + 1 back-off / leg', anchor:true, defaultSets:3, anchorVol:true },
        ]},
        { label: 'Accessories', exercises: [
          { id:'seated-curl-mon', name:'Seated Leg Curl', note:'Upper hamstring emphasis. Slow eccentric, high reps.', target:'4 × 12–15', defaultSets:4 },
          { superset:true, exercises:[
            { id:'leg-press-mon-b', name:'Leg Press (High Foot)', note:'Higher placement shifts to glutes. Chase the pump.', target:'3 × 15–20', defaultSets:3 },
            { id:'calf-ext-mon-b', name:'Calf Extension', note:'Full stretch. High reps, full burn.', target:'3 × 20', defaultSets:3 },
          ]},
          { id:'hip-abd-mon-b', name:'Cable Hip Abduction', note:'Light and controlled. Feel the glute med work.', target:'3 × 15–20 / side', defaultSets:3 },
          { id:'hip-add-mon', name:'Cable Hip Adduction', note:'Inner thigh. Balances abduction, supports squat strength.', target:'3 × 15 / side', defaultSets:3 },
        ]},
        { label: 'Abs', exercises: [
          { id:'hang-leg-raise-mon', name:'Hanging Leg Raise', note:'Legs straight if possible. Posterior tilt at top.', target:'3 × 12–15', defaultSets:3 },
          { id:'decline-leg-raise-mon', name:'Decline Weighted Leg Raise', note:'Dumbbell between feet. Lower abs focus.', target:'3 × 12', defaultSets:3 },
          { id:'oblique-ext-mon', name:'Oblique Extension', note:'Lateral flexion. Feel the stretch opposite side.', target:'3 × 12 / side', defaultSets:3 },
        ]},
      ]
    }
  },
  // TUE — PUSH
  {
    label: 'TUE · Push',
    weekA: {
      id: 'tue-push-a', title: 'PUSH', subtitle: 'Chest Primary — Heavy', tag: 'heavy',
      sections: [
        { label: 'Anchors', exercises: [
          { id:'incline-smith', name:'Incline Smith Press', note:'2 top sets then 1 back-off at 85–90%. 2 sec descent, blades pinched.', target:'2 top + 1 back-off', anchor:true, defaultSets:3 },
          { id:'flat-smith', name:'Flat Smith Press', note:'2 top sets then 1 back-off at 85–90%. Slightly wider grip, full range.', target:'2 top + 1 back-off', anchor:true, defaultSets:3 },
          { id:'military-press', name:'Military Press (Barbell)', note:'2 top sets then 1 back-off at 85–90%. Week A. Full lockout, core braced.', target:'2 top + 1 back-off', anchor:true, defaultSets:3 },
        ]},
        { label: 'Accessories', exercises: [
          { id:'cable-fly-htl', name:'Cable Fly (High to Low)', note:'Stretch at bottom, squeeze at peak.', target:'3 × 10–12', defaultSets:3 },
          { id:'cable-lat-raise-tue', name:'Cable Lateral Raise', note:'One arm, constant tension. Don\'t shrug.', target:'4 × 10–12 / side', defaultSets:4 },
          { superset:true, exercises:[
            { id:'skull-crusher', name:'Skull Crusher', note:'Long head. Slow down, explode up.', target:'3 × 8–10', defaultSets:3 },
            { id:'rope-pushdown', name:'Rope Pushdown', note:'Split the rope at bottom for full contraction.', target:'3 × 10–12', defaultSets:3 },
          ]},
        ]},
      ]
    },
    weekB: {
      id: 'tue-push-b', title: 'PUSH', subtitle: 'Shoulder Primary — Volume', tag: 'volume',
      sections: [
        { label: 'Anchors', exercises: [
          { id:'smith-shoulder-press-vol', name:'Smith Machine Shoulder Press (Volume)', note:'2 working sets + 1 back-off. Week B. Lighter than heavy day, higher reps.', target:'2 sets + 1 back-off', anchor:true, defaultSets:3, anchorVol:true },
          { id:'incline-smith-tue-b', name:'Incline Smith Press', note:'2 working sets + 1 back-off lighter. Volume focus — mind-muscle over load.', target:'2 sets + 1 back-off', anchor:true, defaultSets:3, anchorVol:true },
        ]},
        { label: 'Accessories', exercises: [
          { id:'hex-press-b', name:'Hex Press or 90° Press', note:'Inner chest activation. Hard squeeze at top every rep.', target:'3 × 12–15', defaultSets:3 },
          { id:'cable-fly-lth-b', name:'Cable Fly (Low to High)', note:'Clavicular head, different angle than Week A.', target:'3 × 15', defaultSets:3 },
          { superset:true, exercises:[
            { id:'db-lat-raise-b', name:'Dumbbell Lateral Raise', note:'Free weight version. Challenge then control.', target:'3 × 12–15', defaultSets:3 },
            { id:'cable-lat-raise-light-b', name:'Cable Lateral Raise (Light, Fatigued)', note:'Double frequency lateral delt. Drop the weight, chase the burn.', target:'3 × 20', defaultSets:3 },
          ]},
          { id:'tri-lth-b', name:'Cable Low-to-High Tricep Extension', note:'Long head, different angle than skull crushers. One arm.', target:'3 × 12–15 / arm', defaultSets:3 },
          { id:'tri-overhead-b', name:'Single Arm Overhead Tricep Extension', note:'Long head in stretched position. Slow eccentric.', target:'3 × 12 / arm', defaultSets:3 },
        ]},
      ]
    }
  },
  // WED — PULL
  {
    label: 'WED · Pull',
    weekA: {
      id: 'wed-pull-b', title: 'PULL', subtitle: 'Row Primary — Volume', tag: 'volume',

// ─── STATE ────────────────────────────────────────────────────
let currentDay = 0;
let sessionLogs = {};

// ─── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  setWeekBadge();
  buildTabs();
  await loadDay(0);
});

function setWeekBadge() {
  const badge = document.getElementById('weekBadge');
  const label = document.getElementById('weekLabel');
  if (isWeekA) {
    badge.textContent = 'WEEK A';
    badge.className = 'week-badge week-a';
    label.textContent = 'Heavy Mon/Tue/Sat · Volume Wed/Thu/Fri';
  } else {
    badge.textContent = 'WEEK B';
    badge.className = 'week-badge week-b';
    label.textContent = 'Volume Mon/Tue/Sat · Heavy Wed/Thu/Fri';
  }
}

function getCurrentVariant(dayIndex) {
  const day = PROGRAM[dayIndex];
  if (day.rest) return null;
  return isWeekA ? day.weekA : day.weekB;
}

function buildTabs() {
  const tabsEl = document.getElementById('dayTabs');
  PROGRAM.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.innerHTML = `${day.label}<span class="tab-dot" id="dot-${i}"></span>`;
    btn.onclick = () => switchDay(i);
    tabsEl.appendChild(btn);
  });
}

async function switchDay(index) {
  currentDay = index;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
  await loadDay(index);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function loadDay(index) {
  const variant = getCurrentVariant(index);
  if (!variant) { renderDay(index); return; }
  const saved = await loadFromDB('log_' + variant.id);
  const today = new Date().toISOString().split('T')[0];

  // If saved log is from a previous date, clear inputs but keep history
  if (saved && saved._date && saved._date !== today) {
    sessionLogs = {};
  } else {
    sessionLogs = saved || {};
  }

  const dot = document.getElementById('dot-' + index);
  // Only show green dot if logged today
  if (dot) dot.classList.toggle('has-log', !!(saved && saved._date === today));
  renderDay(index);
}

function renderDay(index) {
  const main = document.getElementById('mainContent');
  const day = PROGRAM[index];
  if (day.rest) {
    main.innerHTML = `<div class="rest-day"><div class="rest-icon">🔋</div><div class="rest-title">REST DAY</div><div class="rest-desc">Six hard days. Sleep, eat your protein, and let the adaptation happen. The work is already done.</div></div>`;
    return;
  }
  const variant = getCurrentVariant(index);
  const today = new Date().toISOString().split('T')[0];
  const savedDate = sessionLogs._date || today;
  const isVol = variant.tag === 'volume';

  let html = `<div class="day-header"><div>
    <div class="day-number">Day ${index + 1} · ${day.label.split('·')[0].trim()} · ${isWeekA ? 'Week A' : 'Week B'} · ${variant.tag.toUpperCase()}</div>
    <div class="day-title">${variant.title}</div>
    <div class="day-subtitle">${variant.subtitle}</div>
  </div><span class="tag tag-${variant.tag}">${variant.tag}</span></div>`;

  html += `<div class="session-row"><input type="date" class="session-date-input" id="sessionDate" value="${savedDate}"></div>`;

  variant.sections.forEach(section => {
    html += `<div class="section"><div class="section-label">${section.label}</div>`;
    section.exercises.forEach(ex => {
      if (ex.superset) {
        html += `<div class="superset-block"><div class="superset-header">⚡ Superset — back to back</div>`;
        ex.exercises.forEach((sex, si) => {
          html += renderExercise(sex, isVol);
          if (si < ex.exercises.length - 1) html += `<div class="superset-divider">↕ then immediately</div>`;
        });
        html += `</div>`;
      } else {
        html += renderExercise(ex, isVol);
      }
    });
    html += `</div>`;
  });
  main.innerHTML = html;
  appendHistoryAndAddExercise(index, variant);
}

function appendHistoryAndAddExercise(index, variant) {
  const main = document.getElementById('mainContent');
  
  // --- ADD EXERCISE SECTION ---
  const addSection = document.createElement('div');
  addSection.className = 'add-exercise-section';
  addSection.innerHTML = `
    <button class="add-exercise-btn" onclick="addCustomExercise('custom-list-${index}')">+ Add Exercise</button>
    <button class="add-superset-btn" onclick="addCustomSuperset('custom-list-${index}', ${index})">⚡ Add Superset</button>
    <button class="add-superset-btn" style="margin-top:4px;" onclick="startPairMode(${index})">🔗 Pair Existing Exercises</button>
    <div id="custom-list-${index}"></div>
    <div id="superset-mode-banner-${index}"></div>
  `;
  main.appendChild(addSection);
  
  // Restore any already-added custom exercises for this session
  const customExercises = sessionLogs._custom || [];
  customExercises.forEach((ex, i) => {
    appendCustomExerciseCard(index, i, ex.name, ex.sets);
  });

  // --- HISTORY SECTION ---
  const histSection = document.createElement('div');
  histSection.className = 'history-section';
  
  const histKey = variant ? 'hist_session_' + variant.id.replace(/-[ab]$/, '') : null;
  const sessions = histKey ? JSON.parse(localStorage.getItem(histKey) || '[]') : [];
  const recent = sessions.slice(-4).reverse();

  let histHtml = `<div class="history-section-label"><span>Past Sessions</span><button class="history-toggle-btn" onclick="toggleHistory(this)">HIDE</button></div>`;
  histHtml += `<div id="history-entries">`;
  
  if (!recent.length) {
    histHtml += `<div style="font-size:12px;color:var(--muted);padding:8px 0;">No sessions logged yet — this will populate after you save workouts.</div>`;
  } else {
    recent.forEach(session => {
      histHtml += `<div class="history-entry">
        <div class="history-entry-header">
          <span class="history-entry-date">${session.date}</span>
          <span class="history-entry-week">${session.week || ''}</span>
        </div>`;
      (session.exercises || []).forEach(ex => {
        if (!ex.sets || !ex.sets.length) return;
        const validSets = ex.sets.filter(s => s.weight || s.reps);
        if (!validSets.length) return;
        const setsStr = validSets.map(s => `${s.weight||'BW'}×${s.reps||'?'}`).join('  ');
        histHtml += `<div class="history-exercise">
          <div class="history-exercise-name">${ex.name}</div>
          <div class="history-sets">${setsStr}</div>
        </div>`;
      });
      histHtml += `</div>`;
    });
  }
  histHtml += `</div>`;
  histSection.innerHTML = histHtml;
  main.appendChild(histSection);
}

function getSuggestion(exId, isVolumeDay, isAnchor) {
  const stored = JSON.parse(localStorage.getItem('hist_' + exId) || '[]');
  const builtin = HISTORY[exId] || [];
  const all = [...builtin, ...stored].sort((a, b) => a.date > b.date ? 1 : -1);
  if (!all.length) return null;

  // For volume days, try to find a heavy day session to base 85-90% off
  // For heavy days, use last session as normal
  const last = all[all.length - 1];
  if (!last.sets || !last.sets.length) return null;

  const weights = last.sets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
  const reps = last.sets.map(s => parseInt(s.reps)).filter(r => !isNaN(r));
  if (!reps.length) return null;

  const lastWeight = weights.length ? Math.max(...weights) : 0;
  const maxReps = Math.max(...reps);
  const avgReps = reps.reduce((a,b)=>a+b,0)/reps.length;

  // Accessories: always hold weight, just chase reps
  if (!isAnchor) {
    return { note: 'Hold weight —', arrow: '→', recWeight: lastWeight, lastWeight, maxReps, lastDate: last.date, isVolume: false };
  }

  if (isVolumeDay) {
    // Volume anchor: suggest 87.5% of top weight, higher reps
    const volWeight = lastWeight > 0 ? Math.round((lastWeight * 0.875) / 5) * 5 : 0;
    const arrow = '→';
    const note = 'Volume — 87.5% of heavy';
    const repTarget = '10–12 reps';
    return { note, arrow, recWeight: volWeight, lastWeight, maxReps, lastDate: last.date, repTarget, isVolume: true };
  } else {
    // Heavy anchor: standard progressive logic
    let recWeight = lastWeight;
    let arrow = '→';
    let note = '';
    if (avgReps >= 7.5) {
      const bump = lastWeight >= 200 ? 5 : lastWeight >= 100 ? 5 : lastWeight > 0 ? 2.5 : 0;
      recWeight = lastWeight + bump;
      arrow = '↑';
      note = 'Looking strong — try';
    } else if (avgReps <= 5) {
      note = 'Build here — stay at';
    } else {
      note = 'Match last session —';
    }
    return { note, arrow, recWeight, lastWeight, maxReps, lastDate: last.date, isVolume: false };
  }
}

function renderExercise(ex, isVol) {
  const log = sessionLogs[ex.id] || {};
  const sets = log.sets || Array(ex.defaultSets).fill(null).map(() => ({ weight: '', reps: '' }));
  const sugg = getSuggestion(ex.id, isVol, ex.anchor);
  const anchorClass = ex.anchor ? (ex.anchorVol ? ' anchor-vol' : ' anchor') : '';
  const customName = localStorage.getItem('name_' + ex.id);
  const displayName = customName || ex.name;
  const targetClass = isVol ? ' vol-target' : '';

  let suggHtml = '';
  if (sugg) {
    const weightDisplay = sugg.recWeight > 0 ? `${sugg.recWeight}lbs` : 'BW';
    const lastDisplay = sugg.lastWeight > 0 ? `${sugg.lastWeight}lbs` : 'BW';
    const repHint = sugg.isVolume ? `<span style="color:var(--orange);font-size:11px;margin-left:6px;">@ ${sugg.repTarget}</span>` : '';
    suggHtml = `<div class="suggestion-box">
      <div class="sugg-title">💡 Suggested</div>
      <div class="sugg-val">${sugg.arrow} ${weightDisplay}${repHint}</div>
      <div class="sugg-last">${sugg.note} — last: ${lastDisplay} × ${sugg.maxReps} (${sugg.lastDate})</div>
    </div>`;
  }

  let setsHtml = '';
  sets.forEach((s, i) => {
    setsHtml += `<div class="set-entry">
      <span class="set-num">S${i+1}</span>
      <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
        value="${s.weight||''}" onchange="updateSet('${ex.id}',${i},'weight',this.value)"/>
      <span style="color:var(--muted);font-size:12px">×</span>
      <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
        value="${s.reps||''}" onchange="updateSet('${ex.id}',${i},'reps',this.value)"/>
    </div>`;
  });

  return `<div class="exercise-card${anchorClass}" data-exid="${ex.id}">
    <div class="move-btns">
      <button class="move-btn" onclick="moveCard(this, -1)" title="Move up">▲</button>
      <button class="move-btn" onclick="moveCard(this, 1)" title="Move down">▼</button>
    </div>
    <button class="delete-exercise-btn" onclick="deleteExerciseCard(this)" title="Remove">✕</button>
    <div class="exercise-header">
      <div>
        <div class="exercise-name" contenteditable="true" spellcheck="false"
          style="outline:none;border-bottom:1px dashed var(--border);min-width:60px;"
          onblur="renameExercise('${ex.id}', this.textContent.trim())"
          title="Tap to rename">${displayName}</div>
        <div class="exercise-note">${ex.note}</div>
      </div>
    </div>
    <div style="padding:2px 14px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);">${ex.target}</div>
    <div class="log-area">
      ${suggHtml}
      <div id="sets-${ex.id}">${setsHtml}</div>
      <button class="add-set-btn" onclick="addSet('${ex.id}')">+ Add Set</button>
    </div>
  </div>`;
}

function updateSet(exId, setIndex, field, value) {
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  if (!sessionLogs[exId].sets) sessionLogs[exId].sets = [];
  while (sessionLogs[exId].sets.length <= setIndex) sessionLogs[exId].sets.push({ weight:'', reps:'' });
  sessionLogs[exId].sets[setIndex][field] = value;
}

function addSet(exId) {
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  if (!sessionLogs[exId].sets) sessionLogs[exId].sets = [];
  sessionLogs[exId].sets.push({ weight:'', reps:'' });
  const container = document.getElementById('sets-' + exId);
  const setIndex = sessionLogs[exId].sets.length - 1;
  const div = document.createElement('div');
  div.className = 'set-entry';
  div.innerHTML = `<span class="set-num">S${setIndex+1}</span>
    <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
      onchange="updateSet('${exId}',${setIndex},'weight',this.value)"/>
    <span style="color:var(--muted);font-size:12px">×</span>
    <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
      onchange="updateSet('${exId}',${setIndex},'reps',this.value)"/>`;
  container.appendChild(div);
}

async function saveDay() {
  const day = PROGRAM[currentDay];
  if (day.rest) return;
  const variant = getCurrentVariant(currentDay);
  const dateEl = document.getElementById('sessionDate');
  sessionLogs._date = dateEl ? dateEl.value : new Date().toISOString().split('T')[0];
  await saveToDB('log_' + variant.id, sessionLogs);
  variant.sections.forEach(section => {
    section.exercises.forEach(ex => {
      const exercises = ex.superset ? ex.exercises : [ex];
      exercises.forEach(e => {
        if (sessionLogs[e.id] && sessionLogs[e.id].sets && sessionLogs[e.id].sets.length) {
          const hist = JSON.parse(localStorage.getItem('hist_' + e.id) || '[]');
          hist.push({ date: sessionLogs._date, sets: sessionLogs[e.id].sets });
          if (hist.length > 12) hist.shift();
          localStorage.setItem('hist_' + e.id, JSON.stringify(hist));
        }
      });
    });
  });
  // Save full session to history for past sessions view
  const histKey = 'hist_session_' + variant.id.replace(/-[ab]$/, '');
  const allSessions = JSON.parse(localStorage.getItem(histKey) || '[]');
  
  // Build exercise list for this session
  const sessionExercises = [];
  variant.sections.forEach(section => {
    section.exercises.forEach(ex => {
      const exList = ex.superset ? ex.exercises : [ex];
      exList.forEach(e => {
        const log = sessionLogs[e.id];
        if (log && log.sets && log.sets.some(s => s.weight || s.reps)) {
          const customName = localStorage.getItem('name_' + e.id);
          sessionExercises.push({ name: customName || e.name, sets: log.sets });
        }
      });
    });
  });
  
  // Add custom exercises
  (sessionLogs._custom || []).filter(Boolean).forEach(ex => {
    if (ex.name && ex.sets && ex.sets.some(s => s.weight || s.reps)) {
      sessionExercises.push(ex);
    }
  });

  if (sessionExercises.length) {
    allSessions.push({
      date: sessionLogs._date,
      week: isWeekA ? 'WEEK A' : 'WEEK B',
      exercises: sessionExercises
    });
    if (allSessions.length > 8) allSessions.shift();
    localStorage.setItem(histKey, JSON.stringify(allSessions));
  }

  const dot = document.getElementById('dot-' + currentDay);
  if (dot) dot.classList.add('has-log');
  showToast('Workout saved!');
}

function clearDay() {
  if (!confirm('Clear this day\'s log?')) return;
  sessionLogs = {};
  renderDay(currentDay);
}

async function saveToDB(key, value) {
  try { await window.storage.set(key, JSON.stringify(value)); } catch(e) { localStorage.setItem(key, JSON.stringify(value)); }
}

async function loadFromDB(key) {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
  catch(e) { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
}


function toggleWeek() {
  isWeekA = !isWeekA;
  setWeekBadge();
  loadDay(currentDay);
}

function renameExercise(exId, newName) {
  if (!newName) return;
  // Store custom name in localStorage
  localStorage.setItem('name_' + exId, newName);
}

// ─── MOVE CARDS UP/DOWN ───────────────────────────────────────
function moveCard(btn, direction) {
  const card = btn.closest('.exercise-card');
  if (!card) return;
  const parent = card.parentNode;
  // Get only direct exercise-card children (not nested in superset)
  const siblings = [...parent.children].filter(el => el.classList.contains('exercise-card') || el.classList.contains('superset-block'));
  const idx = siblings.indexOf(card);
  if (direction === -1 && idx > 0) {
    parent.insertBefore(card, siblings[idx - 1]);
  } else if (direction === 1 && idx < siblings.length - 1) {
    parent.insertBefore(card, siblings[idx + 2] || null);
  }
}


// ─── CUSTOM SUPERSET ─────────────────────────────────────────
function addCustomSuperset(listId, dayIndex) {
  if (!sessionLogs._custom) sessionLogs._custom = [];
  const idx = sessionLogs._custom.length;
  // Add two blank exercises as a superset pair
  sessionLogs._custom.push({ name: 'Exercise A', sets: [{ weight: '', reps: '' }], supersetPair: idx + 1 });
  sessionLogs._custom.push({ name: 'Exercise B', sets: [{ weight: '', reps: '' }], supersetPair: idx });
  appendCustomSupersetCard(dayIndex, idx, idx + 1, '', '', [], []);
}

function appendCustomSupersetCard(dayIndex, idxA, idxB, nameA, nameB, setsA, setsB) {
  const list = document.getElementById('custom-list-' + dayIndex);
  if (!list) return;

  const wrapper = document.createElement('div');
  wrapper.className = 'superset-block';
  wrapper.id = 'custom-superset-' + idxA;

  const makeSets = (sets, idx) => (sets && sets.length ? sets : [{ weight: '', reps: '' }]).map((s, si) => `
    <div class="set-entry">
      <span class="set-num">S${si+1}</span>
      <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
        value="${s.weight||''}" onchange="updateCustomSet(${idx},${si},'weight',this.value)"/>
      <span style="color:var(--muted);font-size:12px">×</span>
      <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
        value="${s.reps||''}" onchange="updateCustomSet(${idx},${si},'reps',this.value)"/>
    </div>`).join('');

  wrapper.innerHTML = `
    <div class="superset-header">⚡ Superset — back to back
      <button onclick="removeCustomSuperset(${idxA}, ${idxB})" style="float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;">✕</button>
    </div>
    <div class="custom-exercise-card" style="margin-bottom:3px;border-radius:7px;">
      <div class="custom-exercise-header">
        <input class="custom-exercise-input" type="text" placeholder="Exercise A"
          value="${nameA}" oninput="updateCustomName(${idxA}, this.value)" />
      </div>
      <div class="log-area">
        <div id="custom-sets-${idxA}">${makeSets(setsA, idxA)}</div>
        <button class="add-set-btn" onclick="addCustomSet(${idxA})">+ Add Set</button>
      </div>
    </div>
    <div class="superset-divider">↕ then immediately</div>
    <div class="custom-exercise-card" style="border-radius:7px;">
      <div class="custom-exercise-header">
        <input class="custom-exercise-input" type="text" placeholder="Exercise B"
          value="${nameB}" oninput="updateCustomName(${idxB}, this.value)" />
      </div>
      <div class="log-area">
        <div id="custom-sets-${idxB}">${makeSets(setsB, idxB)}</div>
        <button class="add-set-btn" onclick="addCustomSet(${idxB})">+ Add Set</button>
      </div>
    </div>`;
  list.appendChild(wrapper);
}

function removeCustomSuperset(idxA, idxB) {
  const wrapper = document.getElementById('custom-superset-' + idxA);
  if (wrapper) wrapper.remove();
  if (sessionLogs._custom) {
    if (sessionLogs._custom[idxA]) sessionLogs._custom[idxA] = null;
    if (sessionLogs._custom[idxB]) sessionLogs._custom[idxB] = null;
  }
}

// ─── PAIR EXISTING EXERCISES ──────────────────────────────────
let pairMode = false;
let pairDayIndex = null;
let pairSelectedCard = null;

function startPairMode(dayIndex) {
  pairMode = true;
  pairDayIndex = dayIndex;
  pairSelectedCard = null;

  const banner = document.getElementById('superset-mode-banner-' + dayIndex);
  banner.innerHTML = `<div class="superset-mode-banner">
    <span>Tap two exercises to superset them</span>
    <button class="superset-mode-cancel" onclick="cancelPairMode(${dayIndex})">✕ Cancel</button>
  </div>`;

  // Add pick styling to all exercise cards
  document.querySelectorAll('.exercise-card').forEach(card => {
    card.classList.add('superset-pick-target');
    card.addEventListener('click', handlePairClick);
  });
}

function cancelPairMode(dayIndex) {
  pairMode = false;
  pairSelectedCard = null;
  const banner = document.getElementById('superset-mode-banner-' + dayIndex);
  if (banner) banner.innerHTML = '';
  document.querySelectorAll('.exercise-card').forEach(card => {
    card.classList.remove('superset-pick-target', 'superset-selected');
    card.removeEventListener('click', handlePairClick);
  });
}

function handlePairClick(e) {
  if (!pairMode) return;
  const card = e.currentTarget;

  if (!pairSelectedCard) {
    // First selection
    pairSelectedCard = card;
    card.classList.add('superset-selected');
  } else if (pairSelectedCard === card) {
    // Deselect
    pairSelectedCard = null;
    card.classList.remove('superset-selected');
  } else {
    // Second selection — wrap both in a superset block
    const cardA = pairSelectedCard;
    const cardB = card;

    const wrapper = document.createElement('div');
    wrapper.className = 'superset-block';
    wrapper.style.marginBottom = '6px';

    const header = document.createElement('div');
    header.className = 'superset-header';
    header.innerHTML = '⚡ Superset — back to back <button onclick="unpairSuperset(this)" style="float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;">✕</button>';

    const divider = document.createElement('div');
    divider.className = 'superset-divider';
    divider.textContent = '↕ then immediately';

    cardA.classList.remove('superset-pick-target', 'superset-selected');
    cardB.classList.remove('superset-pick-target', 'superset-selected');
    cardA.style.borderRadius = '7px';
    cardB.style.borderRadius = '7px';
    cardA.style.marginBottom = '3px';

    const parentA = cardA.parentNode;
    parentA.insertBefore(wrapper, cardA);
    wrapper.appendChild(header);
    wrapper.appendChild(cardA);
    wrapper.appendChild(divider);
    wrapper.appendChild(cardB);
    if (cardB.parentNode && cardB.parentNode !== wrapper) {
      cardB.parentNode.removeChild(cardB);
      wrapper.appendChild(cardB);
    }

    cancelPairMode(pairDayIndex);
  }
}

function unpairSuperset(btn) {
  const wrapper = btn.closest('.superset-block');
  if (!wrapper) return;
  const parent = wrapper.parentNode;
  const cards = wrapper.querySelectorAll('.exercise-card');
  cards.forEach(card => {
    card.style.borderRadius = '';
    card.style.marginBottom = '';
    parent.insertBefore(card, wrapper);
  });
  wrapper.remove();
}

function deleteExerciseCard(btn) {
  const card = btn.closest('.exercise-card');
  if (!card) return;
  const exId = card.dataset.exid;
  if (exId && sessionLogs[exId]) delete sessionLogs[exId];
  card.remove();
}


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
